<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>X Claw Setup Wizard</title>
<style>
  :root {
    --wood-dark: #5a3a1a;
    --wood-medium: #8b6238;
    --wood-light: #b8905a;
    --parchment: #faebd7;
    --parchment-dark: #e8d5b0;
    --grass: #5c8a2f;
    --grass-light: #7cb342;
    --text-dark: #3d2610;
    --text-medium: #6d5030;
    --gold: #ffc107;
    --gold-dark: #f9a825;
    --red: #c0392b;
    --green: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  *::-webkit-scrollbar { width: 10px; }
  *::-webkit-scrollbar-track { background: var(--parchment-dark); border-left: 2px solid var(--wood-light); }
  *::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--wood-light), var(--wood-medium));
    border: 2px solid var(--wood-dark);
  }
  *::-webkit-scrollbar-thumb:hover { background: var(--wood-medium); }

  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    color: var(--text-dark);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #3a7d2a;
    image-rendering: pixelated;
  }

  /* Grass texture background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 80%, #4a8d32 0%, transparent 40%),
      radial-gradient(circle at 80% 20%, #2d6b1a 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #3a7d2a 0%, transparent 60%),
      linear-gradient(180deg, #5a9d3a 0%, #3a7d2a 30%, #2d6b1a 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Main wood-framed container */
  body > * { position: relative; z-index: 1; }

  /* ===== Header ===== */
  .wizard-header {
    padding: 10px 16px 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    background: linear-gradient(180deg, var(--wood-dark) 0%, var(--wood-medium) 60%, var(--wood-light) 100%);
    border-bottom: 3px solid var(--wood-dark);
    box-shadow: 0 3px 0 0 rgba(0,0,0,0.2);
  }
  .wizard-header h1 {
    font-size: 16px;
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 1px 1px 0 var(--wood-dark), 2px 2px 0 rgba(0,0,0,0.3);
    font-family: 'Courier New', 'Consolas', monospace;
  }
  .lang-switch {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--parchment-dark);
    font-size: 11px;
    font-family: 'Courier New', monospace;
  }
  .lang-switch select {
    border: 2px solid var(--wood-light);
    background: rgba(0,0,0,0.25);
    color: var(--parchment-dark);
    border-radius: 2px;
    padding: 2px 4px;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    outline: none;
  }
  .lang-switch select:focus {
    border-color: var(--gold);
  }
  .skip-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    padding: 3px 10px;
    border: 2px solid var(--wood-light);
    border-radius: 2px;
    background: rgba(0,0,0,0.2);
    color: var(--parchment-dark);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Courier New', monospace;
  }
  .skip-btn:hover { color: var(--gold); border-color: var(--gold); background: rgba(0,0,0,0.4); }

  /* ===== Progress Bar ===== */
  .progress-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 10px 12px 8px;
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--wood-medium), var(--wood-light) 40%, var(--parchment-dark));
    border-bottom: 2px solid var(--wood-medium);
  }
  .progress-dot {
    width: 18px; height: 18px;
    background: var(--parchment-dark);
    border: 2px solid var(--wood-medium);
    transition: all 0.3s ease;
    cursor: default;
    position: relative;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }
  .progress-dot.done { cursor: pointer; }
  .progress-dot.active {
    background: var(--gold);
    border-color: var(--gold-dark);
    transform: scale(1.3);
    filter: drop-shadow(0 0 4px rgba(255,193,7,0.6));
  }
  .progress-dot.done {
    background: var(--grass-light);
    border-color: var(--grass);
  }
  .progress-dot::after {
    content: attr(data-label);
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: var(--text-medium);
    white-space: nowrap;
    font-family: 'Courier New', monospace;
    font-weight: 600;
  }

  /* ===== Chat Area ===== */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--parchment);
    border-left: 4px solid var(--wood-medium);
    border-right: 4px solid var(--wood-medium);
    box-shadow: inset 0 0 20px rgba(90,58,26,0.08);
  }

  /* ===== Bubble (RPG Dialogue) ===== */
  .bubble-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 2px;
    background: linear-gradient(135deg, #e8b068, #d49040);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 2px solid var(--wood-dark);
    box-shadow: 1px 1px 0 var(--wood-dark);
  }

  .bubble {
    background: #fffdf5;
    border: 2px solid var(--wood-medium);
    border-radius: 2px;
    padding: 8px 12px;
    max-width: 85%;
    box-shadow: 2px 2px 0 rgba(90,58,26,0.15);
    line-height: 1.6;
    font-size: 13px;
    position: relative;
    color: var(--text-dark);
  }
  .bubble::before {
    content: '';
    position: absolute;
    left: -7px;
    top: 8px;
    width: 0; height: 0;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    border-right: 5px solid var(--wood-medium);
  }
  .bubble::after {
    content: '';
    position: absolute;
    left: -4px;
    top: 9px;
    width: 0; height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-right: 4px solid #fffdf5;
  }
  .bubble .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 13px;
    background: var(--wood-dark);
    animation: blink 0.5s step-end infinite;
    vertical-align: middle;
    margin-left: 1px;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ===== Step Content Card (Game Panel) ===== */
  .step-card {
    background: linear-gradient(180deg, #fffef8, var(--parchment));
    border: 3px solid var(--wood-medium);
    border-radius: 2px;
    padding: 14px 16px;
    box-shadow: 3px 3px 0 rgba(90,58,26,0.15), inset 0 0 0 1px rgba(255,255,255,0.5);
    animation: fadeIn 0.3s ease;
    position: relative;
  }
  .step-card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px; right: -1px; bottom: -1px;
    border: 1px solid var(--wood-light);
    border-radius: 2px;
    pointer-events: none;
  }
  .step-card h3 {
    font-size: 13px;
    color: var(--wood-dark);
    margin-bottom: 10px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    border-bottom: 2px solid var(--parchment-dark);
    padding-bottom: 6px;
  }

  /* ===== Status indicators ===== */
  .status-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 13px;
  }
  .status-icon {
    width: 18px; height: 18px;
    border: 2px solid var(--wood-medium);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    border-radius: 1px;
  }
  .status-icon.loading {
    border-color: var(--wood-light);
    animation: spin 0.8s linear infinite;
  }
  .status-icon.success {
    background: #c8e6c9;
    color: var(--grass);
    border-color: var(--grass);
  }
  .status-icon.fail {
    background: #ffcdd2;
    color: var(--red);
    border-color: var(--red);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Form elements ===== */
  .form-group { margin-bottom: 10px; }
  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--text-medium);
    margin-bottom: 3px;
    font-family: 'Courier New', monospace;
    font-weight: 600;
  }
  .form-input {
    width: 100%;
    padding: 6px 10px;
    border: 2px solid var(--wood-light);
    border-radius: 2px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    background: #fffef8;
    color: var(--text-dark);
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  }
  .form-input:focus {
    border-color: var(--gold-dark);
    box-shadow: 0 0 0 1px var(--gold), inset 0 0 4px rgba(255,193,7,0.1);
  }
  select.form-input {
    cursor: pointer;
    appearance: auto;
  }

  /* ===== Toggle switch ===== */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px dashed var(--parchment-dark);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label {
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toggle-sublabel {
    font-size: 11px;
    color: var(--text-medium);
    opacity: 0.8;
  }
  .toggle-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .toggle-tag {
    font-size: 10px;
    color: var(--text-medium);
    width: 30px;
    text-align: center;
    font-family: 'Courier New', monospace;
  }

  .switch {
    position: relative;
    width: 36px; height: 20px;
    cursor: pointer;
  }
  .switch input { display: none; }
  .switch .slider {
    position: absolute;
    inset: 0;
    background: var(--parchment-dark);
    border: 2px solid var(--wood-light);
    border-radius: 2px;
    transition: 0.2s;
  }
  .switch .slider::before {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    left: 1px; bottom: 1px;
    background: var(--wood-light);
    border-radius: 1px;
    transition: 0.2s;
    box-shadow: 1px 1px 0 rgba(0,0,0,0.15);
  }
  .switch input:checked + .slider {
    background: #a5d6a7;
    border-color: var(--grass);
  }
  .switch input:checked + .slider::before {
    transform: translateX(16px);
    background: var(--grass);
  }

  /* ===== Engine / Provider Cards (Inventory Slot Style) ===== */
  .engine-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .engine-card {
    border: 2px solid var(--wood-light);
    border-radius: 2px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.15s;
    background: #fffef8;
    position: relative;
  }
  /* ===== Note box ===== */
  .note-box {
    background: #fff8e1;
    border: 2px solid #ffe082;
    border-radius: 2px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-medium);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  
  /* ===== TTS Check Results ===== */
  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    margin-bottom: 6px;
    border: 2px solid var(--parchment-dark);
    border-radius: 2px;
    background: var(--parchment);
    transition: all 0.2s;
  }
  .check-icon {
    font-size: 16px;
    min-width: 20px;
  }
  .check-name {
    flex: 1;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dark);
  }
  .check-status {
    font-size: 11px;
    color: var(--text-medium);
  }
  .fix-btn {
    padding: 3px 10px;
    font-size: 10px;
    border: 2px solid var(--gold);
    border-radius: 2px;
    background: var(--gold);
    color: var(--wood-dark);
    cursor: pointer;
    font-weight: 700;
    transition: all 0.2s;
  }
  .fix-btn:hover {
    background: var(--gold-dark);
    border-color: var(--gold-dark);
  }
  .fix-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .recommendation {
    font-size: 12px;
    line-height: 1.5;
  }

  /* ===== Command block with copy ===== */
  .cmd-block {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--wood-dark);
    border-radius: 3px;
    padding: 6px 10px;
    margin: 6px 0;
    font-family: 'Courier New', monospace;
  }
  .cmd-block code {
    flex: 1;
    color: #a8ff78;
    font-size: 11px;
    word-break: break-all;
    user-select: all;
  }
  .copy-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 2px;
    color: #ccc;
    cursor: pointer;
    padding: 2px 6px;
    font-size: 11px;
    transition: all 0.2s;
  }
  .copy-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.4);
  }

  /* ===== 蛋宠孵化注入动画 ===== */
  @keyframes soul-pulse {
    from { transform: scale(1); }
    to   { transform: scale(1.08); }
  }
  @keyframes soul-born {
    0%   { transform: scale(1.2); }
    30%  { transform: scale(0.9); }
    60%  { transform: scale(1.25); }
    80%  { transform: scale(1.05); }
    100% { transform: scale(1.15); }
  }
  @keyframes ring-expand {
    0%   { transform: translate(-50%,-50%) scale(0.8); opacity: 0.8; }
    100% { transform: translate(-50%,-50%) scale(1.6); opacity: 0; }
  }
  @keyframes particle-float {
    0%   { transform: translate(0,0); opacity: 1; }
    100% { transform: translate(var(--tx,0),calc(var(--ty,0) - 40px)); opacity: 0; }
  }
  @keyframes burst-particle {
    0%   { transform: translate(-50%,-50%); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--tx,0)), calc(-50% + var(--ty,0))); opacity: 0; }
  }
  @keyframes star-twinkle {
    from { opacity: 0.1; }
    to   { opacity: 0.6; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ===== Upload area ===== */
  .upload-area {
    border: 2px dashed var(--wood-light);
    border-radius: 2px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fffef8;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: var(--gold-dark);
    background: #fffdf0;
  }
  .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .upload-text { font-size: 13px; color: var(--text-dark); margin-bottom: 4px; }
  .upload-hint { font-size: 11px; color: var(--text-medium); }
  .upload-area.has-file { border-color: var(--grass); border-style: solid; }

  .engine-card:hover {
    border-color: var(--gold-dark);
    background: #fffde0;
  }
  .engine-card.selected {
    border-color: var(--grass);
    background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
    box-shadow: inset 0 0 0 1px rgba(92,138,47,0.2), 2px 2px 0 rgba(90,58,26,0.1);
  }
  .engine-card .engine-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dark);
  }
  .engine-card .engine-desc {
    font-size: 11px;
    color: var(--text-medium);
    margin-top: 1px;
  }
  .engine-card .engine-badge {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 1px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
    border: 1px solid;
  }
  .engine-badge.best {
    background: #fff3cd;
    color: #e65100;
    border-color: #ffb300;
  }
  .engine-badge.recommend {
    background: #e8f5e9;
    color: var(--grass);
    border-color: var(--grass-light);
  }
  .engine-badge.free {
    background: #e3f2fd;
    color: #1565c0;
    border-color: #64b5f6;
  }

  /* ===== Buttons (Game Style) ===== */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    justify-content: flex-end;
  }
  .btn {
    padding: 6px 16px;
    border: 2px solid;
    border-radius: 2px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Courier New', monospace;
    position: relative;
    text-shadow: 0 1px 0 rgba(0,0,0,0.1);
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    filter: grayscale(0.5);
  }
  .btn-primary {
    background: linear-gradient(180deg, var(--grass-light), var(--grass));
    color: white;
    border-color: #3d6b1a;
    box-shadow: 0 3px 0 0 #2d5510, 1px 1px 0 0 #3d6b1a;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
  }
  .btn-primary:hover:not(:disabled) {
    background: linear-gradient(180deg, #8cc34a, var(--grass-light));
    transform: translateY(-1px);
    box-shadow: 0 4px 0 0 #2d5510, 1px 1px 0 0 #3d6b1a;
  }
  .btn-primary:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 1px 0 0 #2d5510;
  }
  .btn-secondary {
    background: linear-gradient(180deg, var(--parchment), var(--parchment-dark));
    color: var(--wood-dark);
    border-color: var(--wood-medium);
    box-shadow: 0 3px 0 0 var(--wood-dark), 1px 1px 0 0 var(--wood-medium);
  }
  .btn-secondary:hover:not(:disabled) {
    background: linear-gradient(180deg, #fff, var(--parchment));
    transform: translateY(-1px);
    box-shadow: 0 4px 0 0 var(--wood-dark), 1px 1px 0 0 var(--wood-medium);
  }
  .btn-secondary:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 1px 0 0 var(--wood-dark);
  }
  .btn-small {
    padding: 4px 12px;
    font-size: 11px;
  }
  .btn-test {
    background: linear-gradient(180deg, var(--gold), var(--gold-dark));
    color: var(--wood-dark);
    border-color: #c68400;
    box-shadow: 0 2px 0 0 #8d5e00;
    padding: 4px 10px;
    font-size: 11px;
    text-shadow: none;
  }
  .btn-test:hover:not(:disabled) {
    background: linear-gradient(180deg, #ffe033, var(--gold));
    transform: translateY(-1px);
    box-shadow: 0 3px 0 0 #8d5e00;
  }
  .btn-test:active:not(:disabled) {
    transform: translateY(1px);
    box-shadow: 0 1px 0 0 #8d5e00;
  }

  /* ===== Footer (Game HUD) ===== */
  .wizard-footer {
    padding: 10px 16px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--wood-light), var(--wood-medium) 40%, var(--wood-dark));
    border-top: 3px solid var(--wood-dark);
    box-shadow: 0 -2px 0 0 rgba(0,0,0,0.15);
  }
  .step-label {
    font-size: 11px;
    color: var(--parchment-dark);
    font-family: 'Courier New', monospace;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  /* ===== Celebration ===== */
  .celebration {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }
  .confetti {
    position: absolute;
    width: 6px; height: 6px;
    animation: confettiFall 3s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(600px) rotate(720deg); opacity: 0; }
  }

  /* ===== Test result list (Quest Log) ===== */
  .test-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .test-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border: 2px solid var(--parchment-dark);
    border-radius: 2px;
    background: #fffef8;
    transition: all 0.2s;
  }
  .test-item.pass {
    background: #e8f5e9;
    border-color: var(--grass-light);
  }
  .test-item.fail {
    background: #fce4ec;
    border-color: #ef9a9a;
  }
  .test-item.skip {
    background: #fff8e1;
    border-color: #ffe082;
  }
  .test-item .test-icon {
    font-size: 16px;
    flex-shrink: 0;

function normalizeWizardLanguage(lang) {
  if (!lang || typeof lang !== 'string') return 'zh-CN';
  if (lang === 'zh-CN' || lang === 'en-US') return lang;
  return lang.toLowerCase().startsWith('en') ? 'en-US' : 'zh-CN';
}

function tw(key, vars = {}) {
  const dict = WIZARD_I18N[uiLanguage] || WIZARD_I18N['zh-CN'];
  const fallback = WIZARD_I18N['zh-CN'];
  let text = dict[key] || fallback[key] || key;
  for (const [k, v] of Object.entries(vars)) {
    text = text.replace(new RegExp(`\\{${k}\\}`, 'g'), String(v));
  }
  return text;
}

function wl(zh, en) {
  return uiLanguage === 'en-US' ? en : zh;
}

function applyWizardLanguage() {
  const langDict = WIZARD_I18N[uiLanguage] || WIZARD_I18N['zh-CN'];
  document.documentElement.lang = langDict.htmlLang || 'zh-CN';
  document.title = tw('title');
  const titleEl = document.getElementById('wizardTitle');
  const skipBtn = document.getElementById('skipBtn');
  const langLabel = document.getElementById('langLabel');
  const langSelect = document.getElementById('wizardLanguage');
  if (titleEl) titleEl.textContent = tw('headerTitle');
  if (skipBtn) skipBtn.textContent = tw('skip');
  if (langLabel) langLabel.textContent = tw('langLabel');
  if (langSelect) langSelect.value = uiLanguage;

  const dotLabels = tw('dots');
  if (Array.isArray(dotLabels)) {
    document.querySelectorAll('.progress-dot').forEach((dot, idx) => {
      dot.dataset.label = dotLabels[idx] || String(idx);
    });
  }

  const btnPrev = document.getElementById('btnPrev');
  if (btnPrev) btnPrev.textContent = tw('prev');
  updateProgress();
}

async function changeWizardLanguage(nextLang) {
  const normalized = normalizeWizardLanguage(nextLang);
  if (normalized === uiLanguage) return;
  uiLanguage = normalized;
  applyWizardLanguage();
  try {
    await wizardAPI.invoke('app-set-language', uiLanguage);
  } catch {}
  wizardAPI.invoke('wizard-save-display-settings', { uiLanguage }).catch(() => {});
  clearChat();
  await renderStep(currentStep);
}

// ===== Helpers =====
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== Typewriter =====
function typewrite(element, text, speed = 30) {
  return new Promise(resolve => {
    element.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';
    element.appendChild(cursor);

    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        element.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        // Scroll chat to bottom
        const chat = document.getElementById('chatArea');
        chat.scrollTop = chat.scrollHeight;
      } else {
        clearInterval(interval);
        cursor.remove();
        resolve();
      }
    }, speed);
  });
}

function addBubble(text, withTypewriter = true) {
  const chat = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'bubble-row';
  row.innerHTML = `
    <div class="avatar">🥚</div>
    <div class="bubble" id="bubble-${Date.now()}"></div>
  `;
  chat.appendChild(row);
  const bubbleEl = row.querySelector('.bubble');

  if (withTypewriter) {
    return typewrite(bubbleEl, text, 25);
  } else {
    bubbleEl.textContent = text;
    chat.scrollTop = chat.scrollHeight;
    return Promise.resolve();
  }
}

function addCard(html) {
  const chat = document.getElementById('chatArea');
  const card = document.createElement('div');
  card.className = 'step-card';
  card.innerHTML = html;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;
  return card;
}

function clearChat() {
  document.getElementById('chatArea').innerHTML = '';
}

// ===== Progress =====
function resetStepSkipFlags(step) {
  // 重置目标步骤的软验证标志，使下次进入该步骤时警告重新生效
  switch (step) {
    case 0: delete stepData._gatewaySkipWarned; break;
    case 1: delete stepData._modelSkipWarned; break;
    case 3: delete stepData._ttsSkipWarned; break;
    case 4: delete stepData._agentSkipWarned; break;
  }
}

function updateProgress() {
  if (currentStep > maxVisitedStep) maxVisitedStep = currentStep;
  document.querySelectorAll('.progress-dot').forEach((dot) => {
    dot.classList.remove('active', 'done');
    const dotStep = parseInt(dot.dataset.step);
    if (dotStep < currentStep) dot.classList.add('done');
    else if (dotStep === currentStep) dot.classList.add('active');
  });
  document.getElementById('stepLabel').textContent = currentStep === -1
    ? tw('stepCounterEnv', { total: totalSteps })
    : tw('stepCounter', { current: currentStep + 1, total: totalSteps - 1 });
  document.getElementById('btnPrev').style.visibility = currentStep > -1 ? 'visible' : 'hidden';

  if (currentStep === totalSteps - 1) {
    document.getElementById('btnNext').textContent = tw('done');
  } else {
    document.getElementById('btnNext').textContent = tw('next');
  }
}

function jumpToStep(step) {
  // Only allow jumping to already-visited steps
  if (step > maxVisitedStep || step === currentStep) return;
  currentStep = step;
  resetStepSkipFlags(step);
  updateProgress();
  clearChat();
  renderStep(currentStep);
}

// ===== Navigation =====
async function nextStep() {
  // Step validation
  if (!validateCurrentStep()) return;

  if (currentStep < totalSteps - 1) {
    // Save current step data
    await saveCurrentStep();
    currentStep++;
    resetStepSkipFlags(currentStep);
    // Save wizard progress
    wizardAPI.invoke('wizard-save-progress', currentStep).catch(() => {});
    updateProgress();
    clearChat();
    await renderStep(currentStep);
  } else {
    // Complete
    await completeWizard();
  }
}

function validateCurrentStep() {
  switch (currentStep) {
    case 0: // Gateway
      if (!stepData.gatewayConnected) {
        addBubble(wl('蛋宠的心跳还没连上呢，确定先跳过吗？', 'Gateway heartbeat is not connected yet. Skip anyway?'), false);
        // Allow skip but warn — set a flag so next click goes through
        if (stepData._gatewaySkipWarned) return true;
        stepData._gatewaySkipWarned = true;
        return false;
      }
      return true;
    case 1: // Model
      if (!stepData.modelProvider) {
        addBubble(wl('蛋宠的大脑还没选好哦，确定先跳过吗？', 'No model is configured yet. Skip anyway?'), false);
        if (stepData._modelSkipWarned) return true;
        stepData._modelSkipWarned = true;
        return false;
      }
      return true;
    case 3: // TTS
      if (stepData.ttsEngine !== 'edge' && !stepData.ttsApiKey) {
        const apiKeyEl = document.getElementById('tts-apikey');
        if (apiKeyEl) stepData.ttsApiKey = apiKeyEl.value.trim();
        if (!stepData.ttsApiKey) {
          addBubble(wl('声带还没喂入 API Key 哦，不填的话会回退到免费的 Edge TTS (^_^)', 'No API key for TTS. It will fall back to free Edge TTS.'), false);
          if (stepData._ttsSkipWarned) {
            stepData.ttsEngine = 'edge';
            return true;
          }
          stepData._ttsSkipWarned = true;
          return false;
        }
      }
      return true;
    case 4: // Agent Voice
      if (!stepData._agentVoiceConfigured) {
        addBubble(wl('⚠️ 还没写入孵化契约文件。请先点「🌀 注入核心」（再点一次强制跳过）', '⚠️ Core files are not written yet. Click "Infuse Core" first (click next twice to force skip).'), false);
        if (stepData._agentSkipWarned) return true;
        stepData._agentSkipWarned = true;
        return false;
      }
      return true;
    default:
      return true;
  }
}

async function goNext() {
  await nextStep();
}

async function prevStep() {
  if (currentStep > 0) {
    await saveCurrentStep();
    currentStep--;
    resetStepSkipFlags(currentStep);
    updateProgress();
    clearChat();
    renderStep(currentStep);
  } else if (currentStep === 0) {
    currentStep = -1;
    resetStepSkipFlags(-1);
    updateProgress();
    clearChat();
    renderStep(-1);
  }
}

async function saveCurrentStep() {
  switch (currentStep) {
    case 1: // Model
      await saveModelConfig();
      break;
    case 2: // Channels
      collectChannelData();
      await wizardAPI.invoke('wizard-save-channels', stepData.channels);
      break;
    case 3: // TTS
      const apiKeyEl = document.getElementById('tts-apikey');
      if (apiKeyEl) stepData.ttsApiKey = apiKeyEl.value.trim();
      await wizardAPI.invoke('wizard-save-tts-engine', {
        engine: stepData.ttsEngine,
        apiKey: stepData.ttsApiKey
      });
      break;
    case 4: // Agent Voice — workspace dir is handled by the "配置播报" button
      break;
    case 5: // Display
      collectDisplaySettings();
      await wizardAPI.invoke('wizard-save-display-settings', {
        lyricsEnabled: stepData.lyricsEnabled,
        alwaysOnTop: stepData.alwaysOnTop,
        autoLaunch: stepData.autoLaunch
      });
      break;
  }
}

function collectChannelData() {
  for (const ch of Object.keys(stepData.channels)) {
    const voiceEl = document.getElementById(`voice-${ch}`);
    const lyricsEl = document.getElementById(`lyrics-${ch}`);
    if (voiceEl) stepData.channels[ch].voice = voiceEl.checked;
    if (lyricsEl) stepData.channels[ch].lyrics = lyricsEl.checked;
  }
}

function collectDisplaySettings() {
  const lyrics = document.getElementById('toggle-lyrics');
  const ontop = document.getElementById('toggle-ontop');
  const autolaunch = document.getElementById('toggle-autolaunch');
  if (lyrics) stepData.lyricsEnabled = lyrics.checked;
  if (ontop) stepData.alwaysOnTop = ontop.checked;
  if (autolaunch) stepData.autoLaunch = autolaunch.checked;
}

// ===== Render Steps =====
async function renderStep(step) {
  switch (step) {
    case -1: await renderEnvCheck(); break;
    case 0: await renderStep1(); break;
    case 1: await renderStepModel(); break;
    case 2: await renderStep2(); break;
    case 3: await renderStep3(); break;
    case 4: await renderStep4(); break;
    case 5: await renderStep5(); break;
    case 6: await renderStep6(); break;
  }
}

// ─── Step 0 (-1): 环境预检 ───────────────────────
async function renderEnvCheck() {
  await addBubble(tw('envIntro1'));
  await addBubble(tw('envIntro2'));

  addCard(`

// ===== 错误人话翻译 =====
function friendlyError(raw) {
  if (!raw) return '';
  const msg = String(raw);
  // 网络/连接类
  if (msg.includes('ECONNREFUSED') && msg.includes('18789')) return wl('Gateway 没有运行，请先启动 Gateway', 'Gateway is not running. Please start it first.');
  if (msg.includes('ECONNREFUSED')) return wl('连接被拒绝，请检查服务是否运行', 'Connection refused. Check whether the service is running.');
  if (msg.includes('ETIMEDOUT') || msg.includes('timeout')) return wl('网络超时，请检查网络连接或代理设置', 'Network timeout. Check your connection or proxy.');
  if (msg.includes('ENOTFOUND')) return wl('DNS 解析失败，请检查网络连接', 'DNS lookup failed. Check your network.');
  if (msg.includes('ECONNRESET')) return wl('连接被重置，可能是网络不稳定', 'Connection reset. Network may be unstable.');
  if (msg.includes('ENETUNREACH')) return wl('网络不可达，请检查网络连接', 'Network unreachable. Check your connection.');
  // API 鉴权类
  if (msg.includes('401') || msg.includes('Unauthorized')) return wl('API Key 无效或已过期，请检查是否完整复制', 'API key is invalid or expired. Check if it was copied completely.');
  if (msg.includes('403') || msg.includes('Forbidden')) return wl('API Key 权限不足，请确认账户余额或权限', 'API key has insufficient permissions. Check balance and permissions.');
  if (msg.includes('429') || msg.includes('rate limit') || msg.includes('Too Many Requests')) return wl('请求过于频繁（限速），请稍等几秒再试', 'Rate limit reached. Wait a few seconds and retry.');
  if (msg.includes('402') || msg.includes('Payment Required')) return wl('账户余额不足，请充值后重试', 'Insufficient balance. Recharge and retry.');
  if (msg.includes('500') || msg.includes('Internal Server Error')) return wl('API 服务器错误，请稍后重试', 'API server error. Try again later.');
  if (msg.includes('503') || msg.includes('Service Unavailable')) return wl('API 服务暂时不可用，请稍后重试', 'API service unavailable. Try again later.');
  // Node.js/文件类
  if (msg.includes('ENOENT')) return wl('文件或目录不存在，请检查安装是否完整', 'File or directory not found. Check installation integrity.');
  if (msg.includes('ENOTDIR')) return wl('路径错误（文件当成了目录），请重启应用', 'Path type error (file used as directory). Restart app.');
  if (msg.includes('EACCES') || msg.includes('EPERM')) return wl('权限不足，请以管理员身份运行', 'Permission denied. Run with administrator privileges.');
  if (msg.includes('ENOSPC')) return wl('磁盘空间不足，请清理磁盘后重试', 'Insufficient disk space. Free space and retry.');
  // OpenClaw 类
  if (msg.includes('openclaw') && msg.includes('不存在')) return wl('OpenClaw 未安装，请先运行: npm install -g openclaw', 'OpenClaw is not installed. Run: npm install -g openclaw');
  if (msg.includes('not found') && msg.includes('openclaw')) return wl('OpenClaw 命令未找到，请重新安装', 'OpenClaw command not found. Reinstall it.');
  if (msg.includes('port') && msg.includes('18789')) return wl('Gateway 端口 18789 被占用，请关闭占用程序或重启电脑', 'Gateway port 18789 is occupied. Close the conflicting process or reboot.');
  // Python 类
  if (msg.includes('No module named')) {
    const m = msg.match(/No module named '?([^'"\s]+)'?/);
    const mod = m?.[1] || wl('模块', 'module');
    return wl(`Python 包 "${mod}" 未安装，请运行: pip install ${mod}`, `Python package "${mod}" is missing. Run: pip install ${mod}`);
  }
  if (msg.includes('python') && msg.includes('not found')) return wl('Python 未安装或不在 PATH 中，请安装 Python 3.6+', 'Python is not installed or not in PATH. Install Python 3.6+.');
  // 安装类
  if (msg.includes('npm ERR') && msg.includes('EACCES')) return wl('npm 权限不足，请以管理员身份运行命令行', 'npm permission denied. Run terminal as administrator.');
  if (msg.includes('npm ERR') && msg.includes('network')) return wl('npm 网络错误，请检查网络或换源: npm config set registry https://registry.npmmirror.com', 'npm network error. Check network or change registry: npm config set registry https://registry.npmmirror.com');
  // 返回原始（截断）
  return msg.length > 80 ? msg.substring(0, 80) + '...' : msg;
}

// ===== 一键复制命令 =====
function copyCmd(cmd, btnEl) {
  navigator.clipboard.writeText(cmd).then(() => {
    const orig = btnEl.textContent;
    btnEl.textContent = wl('✅ 已复制', '✅ Copied');
    btnEl.style.background = 'var(--grass-light)';
    btnEl.style.color = '#fff';
    setTimeout(() => {
      btnEl.textContent = orig;
      btnEl.style.background = '';
      btnEl.style.color = '';
    }, 1500);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = cmd;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btnEl.textContent = wl('✅ 已复制', '✅ Copied');
    setTimeout(() => { btnEl.textContent = '📋'; }, 1500);
  });
}

// 生成带复制按钮的命令块
function cmdBlock(cmd, lang = '') {
  const id = 'cmd-' + Math.random().toString(36).substr(2, 8);
  return `
    <div class="cmd-block" id="${id}">
      <code>${escapeHtml(cmd)}</code>
      <button class="copy-btn" onclick="copyCmd('${cmd.replace(/'/g, "\\'")}', this)" title="${wl('复制命令', 'Copy command')}">📋</button>
    </div>
  `;
}

function setEnvItem(id, status, text, action) {
  const item = document.getElementById(id);
  if (!item) return;

  const icon = item.querySelector('.check-icon');
  const statusEl = item.querySelector('.check-status');

  // 移除旧的修复按钮
  const oldBtn = item.querySelector('.fix-btn');
  if (oldBtn) oldBtn.remove();

  if (status === true) {
    icon.textContent = '✅';
    statusEl.textContent = text;
    statusEl.style.color = 'var(--green)';
    item.style.background = '#e8f5e9';
    item.style.borderColor = 'var(--grass-light)';
  } else if (status === 'warn') {
    icon.textContent = '⚠️';
    statusEl.textContent = text;
    statusEl.style.color = '#f57f17';
    item.style.background = '#fff8e1';
    item.style.borderColor = '#ffe082';
  } else {
    icon.textContent = '❌';
    const errMsg = friendlyError(text.replace(/^❌\s*/, ''));
    statusEl.textContent = '❌ ' + errMsg;
    statusEl.style.color = 'var(--red)';
    item.style.background = '#fce4ec';
    item.style.borderColor = '#ef9a9a';
  }

  // 按钮在 warn 和 false 两种状态都显示（true 时不显示）
  if (action && status !== true) {
    // 如果有命令提示，显示带复制按钮的命令块
    if (action.cmdHint) {
      const cmdDiv = document.createElement('div');
      cmdDiv.innerHTML = cmdBlock(action.cmdHint);
      cmdDiv.style.marginTop = '6px';
      item.appendChild(cmdDiv);
    }
    
    const btn = document.createElement('button');
    btn.className = 'fix-btn';
    btn.textContent = action.label;
    btn.onclick = () => action.action(btn);
    item.appendChild(btn);
  }
}

function updateEnvSummary(r, gatewayJustStarted = false) {
  const summary = document.getElementById('env-summary');
  const actions = document.getElementById('env-actions');
  if (!summary) return;

  const gatewayOk = gatewayJustStarted || r.gateway.ok;
  const coreOk = r.node.ok && r.openclaw.ok && gatewayOk;

  summary.classList.remove('hidden');

  if (coreOk) {
    summary.style.background = '#e8f5e9';
    summary.style.borderColor = 'var(--grass-light)';
    summary.innerHTML = `
      <strong>${tw('envSummaryPassTitle')}</strong> ${tw('envSummaryPassBody')}
      ${!r.python.ok ? `<br><span style="color:#f57f17;">${tw('envSummaryPythonOptional')}</span>` : ''}
    `;
    actions.classList.remove('hidden');
    actions.innerHTML = `
      <div class="btn-row">
        <button class="btn btn-primary" onclick="goNext()">${tw('envActionGoNext')}</button>
      </div>
    `;
  } else {
    summary.style.background = '#fce4ec';
    summary.style.borderColor = '#ef9a9a';
    const missing = [];
    if (!r.node.ok) missing.push('Node.js 18+');
    if (!r.openclaw.ok) missing.push('OpenClaw');
    if (!gatewayOk) missing.push(wl('Gateway 运行中', 'Gateway running'));
    const separator = uiLanguage === 'en-US' ? ', ' : '、';
    summary.innerHTML = `
      <strong>${tw('envSummaryFailTitle')}</strong> — ${tw('envSummaryMissingPrefix')}: ${missing.join(separator)}<br>
      <span style="color:var(--text-medium);">${tw('envSummaryFailBody')}</span>
    `;
    actions.classList.remove('hidden');
    actions.innerHTML = `
      <div class="btn-row">
        <button class="btn btn-test" onclick="renderEnvCheck()">${tw('envActionRetry')}</button>
      </div>
    `;
  }
}

async function testGatewayManual() {

  if (!token) return;

  const icon = document.getElementById('gw-status-icon');
  const text = document.getElementById('gw-status-text');
  icon.className = 'status-icon loading';
  icon.textContent = '';
  text.textContent = wl('正在测试心跳...', 'Testing heartbeat...');

  try {
    const result = await wizardAPI.invoke('wizard-test-gateway', token);
    if (result.success) {
      icon.className = 'status-icon success';

      text.textContent = wl('心跳连接成功！', 'Heartbeat connected!');
      stepData.gatewayConnected = true;

function getModelOptions(provider, selectedModelId) {
  const models = modelPresets[provider] || [];
  if (models.length === 0) return `<option value="">${wl('请先选择提供商', 'Please select provider first')}</option>`;
  return models.map(m =>
    `<option value="${m.id}" ${m.id === selectedModelId ? 'selected' : ''}>${m.name}</option>`
  ).join('');
}

function selectModelProvider(provider, cardEl) {
  stepData.modelProvider = provider;
  document.querySelectorAll('.provider-grid .engine-card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');

  // Update model dropdown
  const select = document.getElementById('model-select');
  select.innerHTML = getModelOptions(provider, '');
  if (select.options.length > 0) {
    stepData.modelId = select.options[0].value;

  // Show preset config, hide custom
  document.getElementById('model-config-area').classList.remove('hidden');

async function saveModelConfig() {
  if (stepData.modelProvider === 'custom-proxy') {
    // Custom provider
    const baseUrl = document.getElementById('custom-baseurl')?.value.trim() || '';
    const apiType = document.getElementById('custom-api-type')?.value || 'openai-completions';
    const modelId = document.getElementById('custom-model-id')?.value.trim() || '';
    const apiKey = document.getElementById('custom-apikey')?.value.trim() || '';
    // BaseURL 格式校验
    if (baseUrl && !/^https?:\/\/.+/i.test(baseUrl)) {
      await addBubble(wl('Base URL 格式不对哦~ 需要以 http:// 或 https:// 开头 (>_<)', 'Invalid Base URL. It must start with http:// or https://'));
      return;
    }
    if (modelId) {
      stepData.modelId = modelId;
      await wizardAPI.invoke('wizard-save-model-config', {
        provider: 'custom-proxy',
        apiKey: apiKey,
        model: modelId,
        baseUrl: baseUrl,
        apiType: apiType,
      });
    }
  } else if (stepData.modelProvider && stepData.modelId) {
    const apiKey = document.getElementById('model-apikey')?.value.trim() || '';
    await wizardAPI.invoke('wizard-save-model-config', {
      provider: stepData.modelProvider,
      apiKey: apiKey,
      model: stepData.modelId,
    });
  }
}

async function testModelConfig() {
  if (!stepData.modelProvider) {
    await addBubble(wl('请先给蛋宠选一个大脑提供商哦~ (>_<)', 'Please choose a provider first.'));
    return;
  }

  // Save first, then check
  await addBubble(wl('正在保存并检测这颗大脑... (o_O)', 'Saving and checking model config...'));

  try {
    await saveModelConfig();

    const checkResult = await wizardAPI.invoke('wizard-check-model-config');
    if (checkResult.status === 'pass') {
      await addBubble(wl('大脑配置已保存！', 'Model config saved! ') + checkResult.message + ' ✧*。(o^_^o)✧*。');
    } else {
      await addBubble(wl('这颗大脑暂时还没接通: ', 'Model not ready yet: ') + checkResult.message + ' (T_T)');
    }
  } catch (err) {
    await addBubble(wl('测试出错: ', 'Test error: ') + err.message + ' (>_<)');
  }
}

async function checkTTSDependencies() {
  const resultsDiv = document.getElementById('tts-check-results');
  resultsDiv.classList.remove('hidden');
  
  try {
    const apiKeyEl = document.getElementById('tts-apikey');
    const config = {
      minimaxApiKey: stepData.ttsEngine.startsWith('minimax') ? (apiKeyEl?.value.trim() || '') : '',
      dashscopeApiKey: stepData.ttsEngine === 'cosyvoice' ? (apiKeyEl?.value.trim() || '') : ''
    };
    
    const results = await wizardAPI.invoke('check-tts', config);
    
    // 更新各项检测结果
    updateCheckItem('check-minimax', results.minimax);
    updateCheckItem('check-dashscope', results.dashscope);
    updateCheckItem('check-python', results.python);
    updateCheckItem('check-edgetts', results.edgeTTS);
    updateCheckItem('check-dashscope-pkg', results.dashscopePackage);
    updateCheckItem('check-tempdir', results.tempDir);
    
    // 更新推荐引擎
    const recommendEl = document.getElementById('recommended-engine');
    const engineNames = {
      'minimax': wl('MiniMax Speech (最佳音质+情感)', 'MiniMax Speech (best quality + emotion)'),
      'dashscope': wl('DashScope CosyVoice (音色克隆)', 'DashScope CosyVoice (voice clone)'),
      'edge': wl('Edge TTS (免费但音质一般)', 'Edge TTS (free, basic quality)'),
      'none': wl('⚠️ 无可用TTS引擎', '⚠️ No available TTS engine')
    };
    recommendEl.textContent = engineNames[results.recommended] || results.recommended;
    recommendEl.parentElement.style.background = results.recommended === 'none' ? '#ffebee' : '#e8f5e9';
    recommendEl.parentElement.style.borderColor = results.recommended === 'none' ? '#ef5350' : 'var(--grass-light)';
    
  } catch (err) {
    console.error('TTS check failed:', err);
    document.getElementById('tts-recommendation').innerHTML = `<strong>${wl('❌ 检测失败:', '❌ Check failed:')}</strong> ${err.message}`;
  }
}

// 更新单个检测项
function updateCheckItem(id, result) {
  const item = document.getElementById(id);
  if (!item) return;
  
  const icon = item.querySelector('.check-icon');
  const status = item.querySelector('.check-status');
  
  if (result.available) {
    icon.textContent = '✅';
    status.textContent = result.version ? `v${result.version}` : wl('可用', 'Available');
    status.style.color = 'var(--green)';
    item.style.background = '#e8f5e9';
  } else {
    icon.textContent = '❌';
    const errMsg = friendlyError(result.error || wl('不可用', 'Unavailable'));
    status.textContent = errMsg;
    status.style.color = 'var(--red)';
    item.style.background = '#ffebee';
    
    // 如果有修复命令，添加带复制按钮的命令块 + 操作按钮
    if (result.fix) {
      // 如果 fix 是命令行（不是 http 链接）
      if (!result.fix.startsWith('http')) {
        const cmdDiv = document.createElement('div');
        cmdDiv.innerHTML = cmdBlock(result.fix);
        item.appendChild(cmdDiv);
      }
      
      const fixBtn = document.createElement('button');
      fixBtn.className = 'fix-btn';
      fixBtn.textContent = result.fix.startsWith('http') ? wl('前往下载', 'Download') : wl('一键安装', 'Install');
      fixBtn.onclick = () => handleTTSFix(id, result);
      item.appendChild(fixBtn);
    }
  }
}

// 处理 TTS 修复
async function handleTTSFix(checkId, result) {
  const item = document.getElementById(checkId);
  const fixBtn = item.querySelector('.fix-btn');
  
  if (fixBtn) {
    fixBtn.textContent = wl('修复中...', 'Fixing...');
    fixBtn.disabled = true;
  }
  
  try {
    if (checkId === 'check-edgetts') {
      // 安装 edge-tts
      const pythonCmd = result.fix.split(' ')[0]; // 提取 python 命令
      const installResult = await wizardAPI.invoke('install-edge-tts', pythonCmd);
      
      if (installResult.success) {
        await addBubble(wl('✅ edge-tts 安装成功！', '✅ edge-tts installed successfully.'));
        checkTTSDependencies(); // 重新检测
      } else {
        await addBubble(wl(`❌ 安装失败: ${installResult.error}\n\n请手动运行:\n${result.fix}`, `❌ Install failed: ${installResult.error}\n\nRun manually:\n${result.fix}`));
      }
    } else if (checkId === 'check-dashscope-pkg') {
      // 安装 dashscope
      const pythonCmd = result.fix.split(' ')[0];
      const installResult = await wizardAPI.invoke('install-dashscope', pythonCmd);
      
      if (installResult.success) {
        await addBubble(wl('✅ dashscope 安装成功！', '✅ dashscope installed successfully.'));
        checkTTSDependencies();
      } else {
        await addBubble(wl(`❌ 安装失败: ${installResult.error}\n\n请手动运行:\n${result.fix}`, `❌ Install failed: ${installResult.error}\n\nRun manually:\n${result.fix}`));
      }
    } else if (checkId === 'check-python') {
      // Python 未安装，打开下载页面
      await addBubble(wl('正在打开 Python 官网下载页面...', 'Opening the Python download page...'));
      wizardAPI.invoke('open-external', result.fix);
    }
  } catch (err) {
    await addBubble(wl(`修复失败: ${err.message}`, `Fix failed: ${err.message}`));
  } finally {
    if (fixBtn) {
      fixBtn.textContent = wl('一键修复', 'Fix now');
      fixBtn.disabled = false;
    }
  }
}

async function startVoiceClone() {
  if (!selectedVoiceFile) {
    await addBubble(wl('请先选择一个音频文件哦~ (>_<)', 'Please select an audio file first.'));
    return;
  }
  const maxSizeMB = 50;
  if (selectedVoiceFile.size > maxSizeMB * 1024 * 1024) {
    await addBubble(wl(`文件太大啦！最大支持 ${maxSizeMB}MB，你的文件是 ${(selectedVoiceFile.size / 1024 / 1024).toFixed(1)}MB (>_<)`, `File too large. Max ${maxSizeMB}MB, yours is ${(selectedVoiceFile.size / 1024 / 1024).toFixed(1)}MB.`));
    return;
  }
  const apiKeyEl = document.getElementById('tts-apikey');
  const apiKey = apiKeyEl ? apiKeyEl.value.trim() : '';
  if (!apiKey) {
    await addBubble(wl('克隆音色需要 API Key 哦~ 请先填入 API Key (>_<)', 'Voice clone requires an API key. Please fill it first.'));
    return;
  }
  const cloneName = document.getElementById('voice-clone-name').value.trim() || wl('我的声音', 'My Voice');
  const statusEl = document.getElementById('clone-status');
  statusEl.innerHTML = `<div class="status-item"><div class="status-icon loading"></div><span>${wl('正在上传并克隆音色... 请耐心等待（约30秒）', 'Uploading and cloning voice... please wait (~30s)')}</span></div>`;
  document.getElementById('btn-clone').disabled = true;

  await addBubble(wl('开始克隆音色啦！上传中... 请耐心等待~ (o_O)', 'Voice clone started. Uploading... please wait.'));

  try {
    const arrayBuffer = await selectedVoiceFile.arrayBuffer();
    const base64 = btoa(new Uint8Array(arrayBuffer).reduce((data, byte) => data + String.fromCharCode(byte), ''));

    const result = await wizardAPI.invoke('wizard-clone-voice', {
      engine: stepData.ttsEngine,
      apiKey: apiKey,
      audioBase64: base64,
      fileName: selectedVoiceFile.name,
      voiceName: cloneName
    });

    if (result.success) {
      statusEl.innerHTML = '<div class="status-item"><div class="status-icon success">✓</div><span>' + wl('音色克隆成功！ID: ', 'Voice cloned! ID: ') + escapeHtml(result.voiceId) + '</span></div>';
      stepData.clonedVoiceId = result.voiceId;
      currentVoiceId = result.voiceId;
      // 更新当前音色显示
      document.getElementById('current-voice-name').textContent = `${result.voiceId} ${wl('(自定义克隆)', '(Cloned)')}`;
      await addBubble(wl('音色克隆成功啦！(^_^) 试听一下新音色...', 'Voice clone succeeded. Try the new voice.'));
      // Auto-test with new voice
      try { await testTTS(); } catch {}
    } else {
      statusEl.innerHTML = '<div class="status-item"><div class="status-icon fail">✗</div><span>' + escapeHtml(result.error) + '</span></div>';
      await addBubble(wl('克隆失败了 (T_T): ', 'Voice clone failed: ') + result.error);
    }
  } catch (err) {
    statusEl.innerHTML = '<div class="status-item"><div class="status-icon fail">✗</div><span>' + escapeHtml(err.message) + '</span></div>';
    await addBubble(wl('出错了 (>_<): ', 'Error: ') + err.message);
  }
  document.getElementById('btn-clone').disabled = false;
}

      animation-delay:${Math.random()*2}s;
    `;

}

// 文件写入行动画
function addSoulFileRow(id, icon, label, status) {
  const list = document.getElementById('soul-file-list');
  const progressList = document.getElementById('soul-progress-list');
  if (!list || !progressList) return;

  progressList.classList.remove('hidden');

  let row = document.getElementById('soul-row-' + id);
  if (!row) {
    row = document.createElement('div');
    row.id = 'soul-row-' + id;
    row.style.cssText = 'display:flex;align-items:center;gap:6px;padding:2px 0;opacity:0;transition:opacity 0.3s;';
    list.appendChild(row);
    setTimeout(() => { row.style.opacity = '1'; }, 50);
  }

  const statusIcon = status === 'loading' ? '<span style="display:inline-block;animation:spin 0.8s linear infinite;">⟳</span>'
    : status === 'done' ? '<span style="color:#4caf50;">✓</span>'
    : '<span style="color:#f44336;">✗</span>';

  const color = status === 'loading' ? '#aaa' : status === 'done' ? '#a8ff78' : '#ff6b6b';
  row.innerHTML = `
    <span style="color:${color};">${icon}</span>
    <span style="color:${color};flex:1;">${label}</span>
    <span>${statusIcon}</span>
  `;
}

// 蛋宠状态变化
function setSoulLobsterPhase(phase) {
  const lobster = document.getElementById('soul-lobster');
  const ring = document.getElementById('soul-ring');
  const statusText = document.getElementById('soul-status-text');
  if (!lobster) return;

  switch (phase) {
    case 'dormant':
      lobster.style.filter = 'grayscale(100%) brightness(0.5)';
      lobster.style.transform = 'scale(1)';
      statusText.textContent = wl('蛋壳核心 · 等待注入', 'Egg core · waiting');
      statusText.style.color = '#666';
      break;
    case 'awakening':
      lobster.style.filter = 'grayscale(60%) brightness(0.7) sepia(30%)';
      lobster.style.transform = 'scale(1.05)';
      lobster.style.animation = 'soul-pulse 0.8s ease-in-out infinite alternate';
      ring.style.border = '2px solid rgba(138,43,226,0.6)';
      ring.style.boxShadow = '0 0 15px rgba(138,43,226,0.4)';
      ring.style.animation = 'ring-expand 1.5s ease-out infinite';
      statusText.textContent = wl('⚡ 能量涌入中...', '⚡ Energy infusing...');
      statusText.style.color = '#b39ddb';
      break;
    case 'infusing':
      lobster.style.filter = 'grayscale(20%) brightness(0.9) hue-rotate(30deg)';
      lobster.style.animation = 'soul-pulse 0.5s ease-in-out infinite alternate';
      ring.style.border = '2px solid rgba(255,140,0,0.8)';
      ring.style.boxShadow = '0 0 25px rgba(255,140,0,0.6)';
      statusText.textContent = wl('🌀 核心正在写入...', '🌀 Writing core...');
      statusText.style.color = '#ffb74d';
      spawnParticles();
      break;
    case 'awakened':
      lobster.style.filter = 'none';
      lobster.style.transform = 'scale(1.2)';
      lobster.style.animation = 'soul-born 0.6s cubic-bezier(0.36,0.07,0.19,0.97) forwards';
      ring.style.border = '2px solid rgba(255,100,50,0.9)';
      ring.style.boxShadow = '0 0 40px rgba(255,100,50,0.8), 0 0 80px rgba(255,100,50,0.3)';
      statusText.textContent = wl('✨ 蛋宠已觉醒！', '✨ Pet awakened!');
      statusText.style.color = '#ff7043';
      setTimeout(() => spawnBurstParticles(), 100);
      break;
  }
}

function spawnParticles() {
  const stage = document.getElementById('soul-stage');
  if (!stage) return;
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.style.cssText = `
        position:absolute;width:4px;height:4px;border-radius:50%;
        background:hsl(${Math.random()*60+200},80%,70%);
        left:${40+Math.random()*20}%;top:${40+Math.random()*20}%;
        animation:particle-float 1.2s ease-out forwards;
        pointer-events:none;
      `;
      stage.appendChild(p);
      setTimeout(() => p.remove(), 1300);
    }, i * 200);
  }
}

function spawnBurstParticles() {
  const stage = document.getElementById('soul-stage');
  if (!stage) return;
  const colors = ['#ff7043','#ff9800','#ffd54f','#a5d6a7','#80deea','#ce93d8'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    const angle = (i / 20) * Math.PI * 2;
    const dist = 40 + Math.random() * 30;
    p.style.cssText = `
      position:absolute;width:${3+Math.random()*4}px;height:${3+Math.random()*4}px;border-radius:50%;
      background:${colors[i % colors.length]};
      left:50%;top:50%;
      transform:translate(-50%,-50%);
      animation:burst-particle 0.8s ease-out forwards;
      --tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*0.1}s;
      pointer-events:none;
    `;
    stage.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

// 主：注入核心
async function infuseSoul() {
  const petName = document.getElementById('pet-name').value.trim() || wl('蛋宝', 'Eggy');
  const userName = document.getElementById('user-name').value.trim() || wl('喂养者', 'Keeper');
  const personalityPreset = document.getElementById('personality-preset').value;
  const customPersonality = document.getElementById('custom-personality')?.value?.trim() || '';
  const workspaceDir = document.getElementById('workspace-dir').value.trim() || '';

  const btn = document.getElementById('btn-infuse');
  btn.disabled = true;
  btn.textContent = wl('🌀 注入中...', '🌀 Infusing...');

  // 清空旧的进度
  const fileList = document.getElementById('soul-file-list');
  if (fileList) fileList.innerHTML = '';

  // 蛋宠开始觉醒
  setSoulLobsterPhase('awakening');

  await addBubble(wl(`好的！${petName} 这个名字真好听 (｡♥‿♥｡)`, `Nice! ${petName} is a great name.`));
  await addBubble(wl('开始为它注入核心——请看好了！(ﾉ>ω<)ﾉ', 'Starting core infusion now.'));

  // 延迟后进入灌注阶段
  await new Promise(r => setTimeout(r, 800));
  setSoulLobsterPhase('infusing');

  // 监听实时进度
  const progressHandler = (data) => {
    addSoulFileRow(data.id, data.icon, data.label,
      data.status === 'loading' ? 'loading' : data.status === 'done' ? 'done' : 'error');
  };
  wizardAPI.on('soul-infuse-progress', progressHandler);

  try {
    const result = await wizardAPI.invoke('wizard-infuse-soul', {
      workspaceDir: workspaceDir || null,
      petName, userName, personalityPreset, customPersonality
    });

    wizardAPI.off('soul-infuse-progress');

    if (result.success) {
      // 蛋宠觉醒！
      setSoulLobsterPhase('awakened');

      await new Promise(r => setTimeout(r, 600));

      await addBubble(`✨✨✨`);
      await addBubble(wl(`${petName}...睁开了眼睛！(ﾉ◕ヮ◕)ﾉ*:･ﾟ✧`, `${petName}... opened its eyes!`));
      await addBubble(wl('它现在知道自己叫什么、服务谁、如何说话', 'It now knows its name, owner, and speaking style.'));
      await addBubble(wl('——它开始呼吸了 🥚✨', '— It starts breathing now 🥚✨'));

      stepData._agentVoiceConfigured = true;
      stepData._agentSkipWarned = false;

      // 显示测试按钮
      const testBtn = document.getElementById('btn-test-voice');
      if (testBtn) testBtn.style.display = 'inline-flex';
      btn.textContent = wl('🌀 重新注入', '🌀 Re-infuse');
      btn.disabled = false;

    } else {
      setSoulLobsterPhase('dormant');
      await addBubble(wl(`核心注入失败了... (T_T) 错误: ${friendlyError(result.error)}`, `Core infusion failed: ${friendlyError(result.error)}`));
      btn.textContent = wl('🌀 注入核心', '🌀 Infuse core');
      btn.disabled = false;
    }
  } catch (err) {
    wizardAPI.off('soul-infuse-progress');
    setSoulLobsterPhase('dormant');
    await addBubble(wl(`出错了 (>_<): ${friendlyError(err.message)}`, `Error: ${friendlyError(err.message)}`));
    btn.textContent = wl('🌀 注入核心', '🌀 Infuse core');
    btn.disabled = false;
  }
}

  await addBubble(wl('我会依次测试心跳、大脑、声带、播报和显示能力，请稍等。', 'I will test heartbeat, brain, voice, delivery, and display in sequence.'));

  const card = addCard(`
    <h3>${wl('完整孵化验收', 'Full Validation')}</h3>
    <div class="test-list" id="test-list">
      <div class="test-item" id="test-gw">
        <div class="status-icon loading" id="test-gw-icon"></div>
        <span class="test-name">${wl('心跳连接', 'Heartbeat')}</span>
        <span class="test-msg" id="test-gw-msg">${wl('测试中...', 'Testing...')}</span>
        <button class="retry-btn hidden" id="test-gw-retry" onclick="retrySingleTest('gateway')">${wl('重试', 'Retry')}</button>
      </div>
      <div class="test-item" id="test-model">
        <div class="status-icon loading" id="test-model-icon"></div>
        <span class="test-name">${wl('AI 大脑配置', 'AI model config')}</span>
        <span class="test-msg" id="test-model-msg">${wl('等待中...', 'Waiting...')}</span>
        <button class="retry-btn hidden" id="test-model-retry" onclick="retrySingleTest('model')">${wl('重试', 'Retry')}</button>
      </div>
      <div class="test-item" id="test-tts">
        <div class="status-icon loading" id="test-tts-icon"></div>
        <span class="test-name">${wl('蛋宠声带', 'TTS voice')}</span>
        <span class="test-msg" id="test-tts-msg">${wl('等待中...', 'Waiting...')}</span>
        <button class="retry-btn hidden" id="test-tts-retry" onclick="retrySingleTest('tts')">${wl('重试', 'Retry')}</button>
      </div>
      <div class="test-item" id="test-voice">
        <div class="status-icon loading" id="test-voice-icon"></div>
        <span class="test-name">${wl('播报链路', 'Delivery pipeline')}</span>
        <span class="test-msg" id="test-voice-msg">${wl('等待中...', 'Waiting...')}</span>

        <span class="test-name">${wl('桌面歌词', 'Desktop captions')}</span>
        <span class="test-msg" id="test-lyrics-msg">${wl('等待中...', 'Waiting...')}</span>
      </div>
      <div class="test-item" id="test-files">
        <div class="status-icon loading" id="test-files-icon"></div>
        <span class="test-name">${wl('孵化契约文件', 'Core files')}</span>

      </div>
    </div>
  `);

  // Disable next button during testing
  document.getElementById('btnNext').disabled = true;

  try {
    const results = await wizardAPI.invoke('wizard-run-full-test');
    stepData.testResults = results;

    // Update UI
    updateTestItem('gw', results.gateway);

function updateTestItem(key, result) {
  const item = document.getElementById(`test-${key}`);
  const icon = document.getElementById(`test-${key}-icon`);
  const msg = document.getElementById(`test-${key}-msg`);
  const retryBtn = document.getElementById(`test-${key}-retry`);

  icon.className = 'status-icon';
  if (result.status === 'pass') {
    icon.classList.add('success');
    icon.textContent = '✓';
    item.className = 'test-item pass';
    if (retryBtn) retryBtn.classList.add('hidden');
  } else if (result.status === 'fail') {
    icon.classList.add('fail');
    icon.textContent = '✗';
    item.className = 'test-item fail';
    if (retryBtn) retryBtn.classList.remove('hidden');
  } else {
    icon.textContent = '—';
    item.className = 'test-item skip';
    if (retryBtn) retryBtn.classList.add('hidden');
  }
  msg.textContent = result.message;
}

async function retrySingleTest(testKey) {
  const keyMap = { gateway: 'gw', model: 'model', tts: 'tts', voice: 'voice' };
  const uiKey = keyMap[testKey] || testKey;
  const icon = document.getElementById(`test-${uiKey}-icon`);
  const msg = document.getElementById(`test-${uiKey}-msg`);
  const retryBtn = document.getElementById(`test-${uiKey}-retry`);

  icon.className = 'status-icon loading';
  icon.textContent = '';
  msg.textContent = wl('重试中...', 'Retrying...');
  if (retryBtn) retryBtn.classList.add('hidden');

  try {
    const result = await wizardAPI.invoke('wizard-retry-single-test', testKey);
    updateTestItem(uiKey, result);
    if (stepData.testResults) stepData.testResults[testKey] = result;
  } catch (err) {
    updateTestItem(uiKey, { status: 'fail', message: err.message });
  }
}

// ===== Init =====
async function init() {
  // Load existing config
  try {
    const config = await wizardAPI.invoke('wizard-get-config');
    uiLanguage = normalizeWizardLanguage(config.uiLanguage);
    if (config.channels && Object.keys(config.channels).length > 0) {
      stepData.channels = { ...stepData.channels, ...config.channels };
    }
    stepData.lyricsEnabled = config.lyricsEnabled !== false;
    stepData.alwaysOnTop = config.alwaysOnTop !== false;
    stepData.autoLaunch = config.autoLaunch === true;

    // Resume from saved wizard step
    const savedStep = config.wizardStep || 0;
    if (savedStep > 0 && savedStep < totalSteps) {
      currentStep = savedStep;
      maxVisitedStep = savedStep;
    }
  } catch (e) { /* use defaults */ }

  try {
    const appLang = await wizardAPI.invoke('app-get-language');
    uiLanguage = normalizeWizardLanguage(appLang || uiLanguage);
  } catch {}

  applyWizardLanguage();

  wizardAPI.on('app-language-changed', async (lang) => {
    const normalized = normalizeWizardLanguage(lang);
    if (normalized === uiLanguage) return;
    uiLanguage = normalized;
    applyWizardLanguage();
    clearChat();
    await renderStep(currentStep);
  });

  updateProgress();
  await renderStep(currentStep);
}

init();
