<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SparkEgg 🥚</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    *::-webkit-scrollbar { display: none; }
    html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    .container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    /* ===== 孵化蛋 76px ===== */
    .pet-wrapper {
        width: 76px;
        height: 88px;
        position: relative;
        cursor: grab;
        will-change: transform;
    }
    .pet-wrapper:active { cursor: grabbing; }

    .inner-fluid {
        position: absolute;
        top: 4px; left: 6px; right: 6px; bottom: 6px;
        border-radius: 48% 48% 44% 44% / 42% 42% 58% 58%;
        overflow: hidden;
        z-index: 1;
        background: linear-gradient(180deg, #8fd3ff 0%, #b88dff 30%, #ff93ba 58%, #ffbf66 100%);
        transition: filter 0.4s ease;
    }
    .fluid-blob {
        position: absolute;
        width: 130%; height: 130%; top: -15%; left: -15%;
        background:
            radial-gradient(circle at 22% 26%, rgba(110,205,255,0.9), transparent 38%),
            radial-gradient(circle at 72% 32%, rgba(182,112,255,0.76), transparent 40%),
            radial-gradient(circle at 66% 76%, rgba(255,168,94,0.72), transparent 42%);
        animation: fluid-spin 8s linear infinite;
    }
    .fluid-blob-2 {
        position: absolute;
        width: 110%; height: 110%; top: -5%; left: -5%;
        background:
            radial-gradient(circle at 56% 26%, rgba(255,232,129,0.34), transparent 35%),
            radial-gradient(circle at 28% 72%, rgba(255,126,191,0.28), transparent 34%),
            radial-gradient(circle at 74% 74%, rgba(108,240,210,0.24), transparent 32%);
        animation: fluid-spin-r 12s linear infinite;
    }
    .dragon-shadow {
        position: absolute;
        inset: 8px 7px 12px 8px;
        z-index: 2;
        opacity: 0.46;
        filter: blur(0);
        transform: rotate(-8deg) scale(1.02);
        pointer-events: none;
        mix-blend-mode: normal;
    }
    .dragon-shadow .dragon-body {
        position: absolute;
        width: 18px;
        height: 54px;
        left: 27px;
        top: 9px;
        border-radius: 56% 44% 58% 42% / 18% 22% 70% 76%;
        background:
            radial-gradient(ellipse at 48% 18%, rgba(255,253,234,0.96), transparent 24%),
            linear-gradient(180deg, rgba(255,247,207,0.82) 0%, rgba(161,249,237,0.2) 100%);
        box-shadow:
            inset 0 -8px 10px rgba(255,194,128,0.26),
            inset 2px 0 10px rgba(255,255,255,0.22),
            0 0 8px rgba(255,242,196,0.28);
    }
    .dragon-shadow .dragon-body::before {
        content: '';
        position: absolute;
        width: 20px;
        height: 18px;
        left: -1px;
        top: -5px;
        border-radius: 62% 38% 48% 52%;
        background: linear-gradient(135deg, rgba(255,248,214,0.96), rgba(255,201,125,0.52));
        transform: rotate(-8deg);
    }
    .dragon-shadow .dragon-body::after {
        content: '';
        position: absolute;
        width: 30px;
        height: 52px;
        right: -18px;
        bottom: -6px;
        border-radius: 50%;
        border-right: 5px solid rgba(255,246,210,0.76);
        border-bottom: 4px solid rgba(255,230,174,0.38);
        transform: rotate(34deg);
    }
    .dragon-shadow .dragon-tail {
        position: absolute;
        width: 34px;
        height: 54px;
        left: 34px;
        top: 32px;
        border-radius: 50%;
        border-right: 5px solid rgba(255,247,214,0.7);
        border-bottom: 4px solid rgba(255,220,150,0.34);
        transform: rotate(44deg);
    }
    .dragon-shadow .dragon-tail::after {
        content: '';
        position: absolute;
        width: 10px;
        height: 10px;
        right: -2px;
        bottom: -2px;
        border-radius: 2px 8px 7px 8px;
        background: rgba(255,245,206,0.62);
        transform: rotate(28deg);
    }
    .dragon-shadow .dragon-horn {
        position: absolute;
        width: 8px;
        height: 16px;
        left: 26px;
        top: -1px;
        border-radius: 80% 20% 80% 20%;
        background: rgba(255,246,214,0.88);
        transform: rotate(-36deg);
    }
    .dragon-shadow .dragon-horn.horn-r {
        left: 38px;
        top: 0;
        transform: scaleX(-1) rotate(-26deg);
    }
    .dragon-shadow .dragon-whisker {
        position: absolute;
        width: 26px;
        height: 16px;
        left: 10px;
        top: 10px;
        border-top: 3px solid rgba(255,246,214,0.74);
        border-radius: 50%;
        transform: rotate(-24deg);
    }
    .dragon-shadow .dragon-whisker.whisker-r {
        left: 28px;
        top: 12px;
        transform: scaleX(-1) rotate(-12deg);
    }
    .dragon-shadow .dragon-mane {
        position: absolute;
        width: 8px;
        height: 36px;
        left: 23px;
        top: 10px;
        border-radius: 8px;
        background:
            radial-gradient(circle at 50% 8%, rgba(255,245,210,0.5), transparent 34%),
            linear-gradient(180deg, rgba(255,214,150,0.36), rgba(255,214,150,0.06));
        filter: blur(0);
        transform: rotate(-10deg);
    }

    .glass-shell {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        border-radius: 48% 48% 44% 44% / 42% 42% 58% 58%; z-index: 2;
        background:
            radial-gradient(circle at 24% 20%, rgba(255,255,255,0.22), transparent 20%),
            linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
        box-shadow:
            inset -3px -5px 12px rgba(255,255,255,0.08),
            inset 3px 3px 12px rgba(255,255,255,0.32),
            0px 8px 18px rgba(112,96,164,0.18);
        border: 1px solid rgba(255,255,255,0.28);
        transition: box-shadow 1.0s cubic-bezier(0.4, 0.0, 0.2, 1), border 1.0s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .glass-shell::before {
        content: '';
        position: absolute; top: 12%; left: 18%; width: 28%; height: 12%;
        border-radius: 50%; 
        background: rgba(255,255,255,0.55);
        filter: blur(1px); 
        transform: rotate(-40deg);
        transition: opacity 1.0s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .glass-shell::after {
        content: '';
        position: absolute; bottom: 22%; right: 20%; width: 16%; height: 10%;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        filter: blur(1px);
        transform: rotate(25deg);
        transition: opacity 1.0s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .glass-shell .shell-band {
        position: absolute;
        left: 50%;
        top: 18%;
        width: 68%;
        height: 18%;
        transform: translateX(-50%);
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.28);
        background: linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,236,173,0.16), rgba(255,255,255,0.06));
    }
    .glass-shell .shell-glyph {
        position: absolute;
        left: 50%;
        bottom: 18%;
        width: 36%;
        height: 18%;
        transform: translateX(-50%);
        border-radius: 50% 50% 40% 40%;
        border: 1px solid rgba(255,255,255,0.22);
        background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,193,102,0.18));
    }
    .glass-shell .shell-ring {
        position: absolute;
        left: 50%;
        top: 42%;
        width: 54%;
        height: 26%;
        transform: translateX(-50%);
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.22);
        opacity: 0.72;
    }
    .glass-shell .shell-specks,
    .glass-shell .shell-lines {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.72;
    }
    .glass-shell .shell-specks {
        background:
            radial-gradient(circle at 28% 30%, rgba(255,255,255,0.44) 0 1.5px, transparent 2px),
            radial-gradient(circle at 64% 24%, rgba(255,255,255,0.34) 0 1.5px, transparent 2px),
            radial-gradient(circle at 72% 62%, rgba(255,255,255,0.3) 0 1.5px, transparent 2px),
            radial-gradient(circle at 36% 70%, rgba(255,255,255,0.28) 0 1.5px, transparent 2px);
    }
    .glass-shell .shell-lines {
        background:
            linear-gradient(90deg, transparent 22%, rgba(255,255,255,0.16) 22% 24%, transparent 24% 76%, rgba(255,255,255,0.16) 76% 78%, transparent 78%),
            linear-gradient(180deg, transparent 58%, rgba(255,255,255,0.1) 58% 60%, transparent 60%);
        mix-blend-mode: soft-light;
    }

    /* 胶囊眼睛 */
    .eyes-container {
        position: absolute; z-index: 3;
        top: 28%; left: 12%; width: 76%; height: 34%;
        display: flex; justify-content: center; align-items: center;
        gap: 10px;
        pointer-events: none;
        overflow: visible;
    }
    .eye {
        width: 10px; height: 18px;
        background: white;
        border-radius: 6px;
        box-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 16px rgba(255,255,255,0.4);
        transition: width 0.18s, height 0.18s, border-radius 0.18s, transform 0.18s cubic-bezier(0.25, 1, 0.5, 1);
        transform-origin: center center;
    }

    /* 腮红 */
    .blush {
        position: absolute; z-index: 3;
        width: 14px; height: 8px; border-radius: 50%;
        background: rgba(255,130,130,0.25); filter: blur(3px);
        pointer-events: none; 
        /* 🎨 2秒平滑过渡 */
        transition: background 2.0s cubic-bezier(0.33, 0.0, 0.2, 1), opacity 0.6s ease; 
        opacity: 0.8;
    }
    .blush-l { top: 56%; left: 14%; }
    .blush-r { top: 56%; right: 14%; }

    /* 气泡装饰 */
    .bub {
        position: absolute; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.06));
        border: 1px solid rgba(255,255,255,0.12);
        z-index: 0; opacity: 0; pointer-events: none;
    }
    .bub-1 { width: 5px; height: 5px; left: -5px; top: 60%; animation: bub 5s ease-in infinite 0s; }
    .bub-2 { width: 3px; height: 3px; right: -4px; top: 40%; animation: bub 6.5s ease-in infinite 2s; }

    .particles {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 10;
    }

    .state-pill {
        position: absolute;
        top: calc(50% + 48px);
        left: 50%;
        transform: translateX(-50%);
        min-width: 136px;
        max-width: 178px;
        padding: 5px 11px 6px;
        border-radius: 13px;
        background: rgba(255,255,255,0.82);
        color: #5c6f9c;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-align: center;
        line-height: 1.24;
        box-shadow: 0 4px 12px rgba(76, 101, 152, 0.12);
        z-index: 15;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    .state-pill .pill-main {
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .state-pill .pill-sub {
        font-size: 9px;
        color: #7489b3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* ===== 图标工具栏 ===== */
    .toolbar {
        position: absolute;
        top: calc(50% + 78px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 7px;
        padding: 6px 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.62);
        border: 1px solid rgba(255,255,255,0.45);
        box-shadow: 0 10px 24px rgba(93, 116, 168, 0.14);
        backdrop-filter: blur(14px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease, transform 0.25s ease;
        z-index: 20;
    }
    .container:hover .toolbar {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(2px);
    }

    .tool-icon {
        width: 28px; height: 28px;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(243, 238, 249, 0.86));
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: inset 0 -4px 8px rgba(145, 153, 203, 0.12), 0 3px 10px rgba(0,0,0,0.12);
    }
    .tool-icon svg {
        width: 13px; height: 13px;
        stroke: #6d73a6; fill: none;
        stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .tool-icon:hover {
        transform: translateY(-2px) scale(1.08);
        box-shadow: inset 0 -4px 8px rgba(145, 153, 203, 0.12), 0 8px 18px rgba(106, 118, 171, 0.2);
    }
    .tool-icon:active { transform: scale(0.9); }

    /* 模型切换按钮 */
    .model-switch-btn {
        min-width: 28px;
        padding: 0 4px;
        border-radius: 12px;
    }
    .model-switch-btn:hover {
        background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(240, 237, 249, 0.92));
    }
    .tool-icon.active {
        background: linear-gradient(180deg, rgba(255,255,255,1), rgba(240, 243, 255, 0.96));
        box-shadow: 0 0 8px rgba(255,255,255,0.5), 0 8px 18px rgba(114, 128, 184, 0.18);
    }

    /* 输入条 */
    .input-bar {
        position: absolute;
        top: calc(50% + 98px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        padding: 6px;
        border-radius: 18px;
        background: rgba(255,255,255,0.64);
        border: 1px solid rgba(255,255,255,0.46);
        box-shadow: 0 10px 24px rgba(87, 111, 161, 0.14);
        backdrop-filter: blur(14px);
        opacity: 0;
        pointer-events: none;
        transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        z-index: 20;
    }
    .input-bar.show {
        opacity: 1;
        pointer-events: auto;
    }
    .input-bar input {
        width: 172px;
        padding: 7px 12px;
        border: none;
        border-radius: 12px;
        background: rgba(255,255,255,0.84);
        font-size: 11px;
        outline: none;
        color: #5a6794;
        box-shadow: inset 0 -4px 8px rgba(145, 153, 203, 0.1);
    }
    .input-bar button {
        min-width: 34px;
        padding: 0 10px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #85a7ff, #7ce4ee);
        color: white;
        font-size: 11px;
        cursor: pointer;
        box-shadow: 0 6px 14px rgba(117, 164, 244, 0.22);
    }

    .reply-bubble {
        position: absolute;
        left: 50%;
        bottom: calc(50% + 78px);
        transform: translateX(-50%) translateY(6px);
        max-width: 220px;
        padding: 10px 12px;
        border-radius: 16px;
        background: rgba(255,255,255,0.9);
        color: #4c5f8f;
        font-size: 11px;
        line-height: 1.45;
        box-shadow: 0 10px 30px rgba(74, 101, 160, 0.18);
        border: 1px solid rgba(255,255,255,0.55);
        backdrop-filter: blur(14px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.24s ease, transform 0.24s ease;
        z-index: 30;
    }
    .reply-bubble.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .reply-bubble::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: -7px;
        width: 14px;
        height: 14px;
        transform: translateX(-50%) rotate(45deg);
        background: rgba(255,255,255,0.9);
        border-right: 1px solid rgba(255,255,255,0.55);
        border-bottom: 1px solid rgba(255,255,255,0.55);
    }

    @keyframes fluid-spin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.08); }
        100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes fluid-spin-r {
        0% { transform: rotate(360deg) scale(1.05); }
        50% { transform: rotate(180deg) scale(0.95); }
        100% { transform: rotate(0deg) scale(1.05); }
    }
    @keyframes bub {
        0% { opacity: 0; transform: translateY(0) scale(0.3); }
        15% { opacity: 0.5; }
        100% { opacity: 0; transform: translateY(-30px) translateX(5px) scale(1); }
    }
    @keyframes squish {
        0% { transform: scale(1, 1); }
        25% { transform: scale(1.15, 0.85); }
        50% { transform: scale(0.9, 1.1); }
        75% { transform: scale(1.05, 0.95); }
        100% { transform: scale(1, 1); }
    }
</style>
</head>
<body>
<div class="container">
    <div class="pet-wrapper" id="pet">
        <div class="inner-fluid" id="fluid">
            <div class="fluid-blob" id="blob1"></div>
            <div class="fluid-blob-2" id="blob2"></div>
            <div class="dragon-shadow" aria-hidden="true">
                <div class="dragon-horn"></div>
                <div class="dragon-horn horn-r"></div>
                <div class="dragon-whisker"></div>
                <div class="dragon-whisker whisker-r"></div>
                <div class="dragon-mane"></div>
                <div class="dragon-body"></div>
                <div class="dragon-tail"></div>
            </div>
        </div>
        <div class="glass-shell">
            <div class="shell-band"></div>
            <div class="shell-ring"></div>
            <div class="shell-glyph"></div>
            <div class="shell-specks"></div>
            <div class="shell-lines"></div>
        </div>
        <div class="eyes-container" id="eyes">
            <div class="eye" id="eyeL"></div>
            <div class="eye" id="eyeR"></div>
        </div>
        <div class="blush blush-l" id="blushL"></div>
        <div class="blush blush-r" id="blushR"></div>
        <div class="bub bub-1"></div>
        <div class="bub bub-2"></div>
        <div class="particles" id="particles"></div>
    </div>
    <div class="state-pill" id="statePill">...</div>

    <!-- 图标工具栏 -->
    <div class="toolbar" id="toolbar">
        <div class="tool-icon" id="btnChat" title="发消息" onclick="toggleInput()">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="tool-icon" id="btnVoice" title="播报开关" onclick="toggleVoice()">
            <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 3 9 3 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 5.5a9 9 0 0 1 0 13"></path></svg>
        </div>
        <div class="tool-icon" id="btnScreenshot" title="截图" onclick="screenshot()">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="tool-icon model-switch-btn" id="btnModelSwitch" title="切换模型（当前：Claude Opus 4.6）" onclick="cycleModel()">
            <span id="modelBadge" style="font-size:9px;font-weight:700;color:#666;user-select:none;letter-spacing:0.04em;">OP</span>
        </div>
    </div>

    <!-- 输入条 -->
    <div class="input-bar" id="inputBar">
        <input type="text" id="input" placeholder="说点什么..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">↑</button>
    </div>

</div>

<script>
const pet = document.getElementById('pet');
const eyeL = document.getElementById('eyeL');
const eyeR = document.getElementById('eyeR');
const fluid = document.getElementById('fluid');
const blob1 = document.getElementById('blob1');
const blob2 = document.getElementById('blob2');
let _moodTimer = null;
const blushL = document.getElementById('blushL');
const blushR = document.getElementById('blushR');
const particlesEl = document.getElementById('particles');
const glassShell = document.querySelector('.glass-shell');
const inputBar = document.getElementById('inputBar');
const inputEl = document.getElementById('input');
const btnVoice = document.getElementById('btnVoice');
const statePill = document.getElementById('statePill');
const shellBand = document.querySelector('.shell-band');
const shellRing = document.querySelector('.shell-ring');
const shellGlyph = document.querySelector('.shell-glyph');
const shellSpecks = document.querySelector('.shell-specks');
const shellLines = document.querySelector('.shell-lines');

let voiceOn = true;
let isConnected = false;
let isAwaitingReply = false;
let growthProfile = { connected: false, energy: 0, level: 1, stars: 1 };
let uiLanguage = 'zh-CN';

function normalizeLang(lang) {
    if (!lang || typeof lang !== 'string') return 'zh-CN';
    if (lang === 'zh-CN' || lang === 'en-US') return lang;
    return lang.toLowerCase().startsWith('en') ? 'en-US' : 'zh-CN';
}

function wl(zh, en) {
    return uiLanguage === 'en-US' ? en : zh;
}

function updateUiTextByLanguage() {
    const input = document.getElementById('input');
    const btnChat = document.getElementById('btnChat');
    const btnVoiceLocal = document.getElementById('btnVoice');
    const btnShot = document.getElementById('btnScreenshot');
    const btnModel = document.getElementById('btnModelSwitch');
    if (input) input.placeholder = wl('说点什么...', 'Say something...');
    if (btnChat) btnChat.title = wl('发消息', 'Send message');
    if (btnVoiceLocal) btnVoiceLocal.title = voiceOn ? wl('关闭播报', 'Disable voice') : wl('开启播报', 'Enable voice');
    if (btnShot) btnShot.title = wl('截图', 'Screenshot');
    if (btnModel && !btnModel.title.includes('当前') && !btnModel.title.includes('Current')) {
        btnModel.title = wl('切换模型', 'Switch model');
    }
}

function updateStatePill() {
    if (!statePill) return;
    const moodLabel = isAwaitingReply ? wl('思考中', 'Thinking') : (STATE_LABELS[currentMood]?.[uiLanguage] || wl('稳定', 'Stable'));
    const mainText = `${moodLabel} · ${PET_NAME}`;
    const subText = growthProfile && growthProfile.connected
        ? `Lv${growthProfile.level} · ${wl('能量', 'Energy')}${growthProfile.energy}`

// ===== 60fps 动画 =====
let t = 0, squishing = false, targetScale = 1, curScale = 1, breathExtra = 0;

// 有机运动参数
let deepBreathPhase = 0;       // 深呼吸相位（0=正常，>0=正在深呼吸）
let fidgetSeed = Math.random() * 100;  // 微动作种子
let lastInteraction = Date.now();      // 上次互动时间

function loop() {
    t += 0.016;
    curScale += (targetScale - curScale) * 0.08;

    // === 多频叠加有机浮动（替代单一正弦波）===
    const floatY = Math.sin(t * 1.3) * 3.5
                 + Math.sin(t * 0.67) * 2
                 + Math.sin(t * 2.3) * 0.6;
    const floatR = Math.sin(t * 0.9) * 0.3
                 + Math.sin(t * 0.37) * 0.2;

    // === 呼吸：基础 + 偶尔深呼吸 ===
    let breathScale = 1 + Math.sin(t * 2) * 0.01
                        + Math.sin(t * 0.8) * 0.005;
    if (deepBreathPhase > 0) {
        // 深呼吸：吸气膨胀 → 呼气收缩
        breathScale += Math.sin(deepBreathPhase) * 0.025;
        deepBreathPhase += 0.04;
        if (deepBreathPhase > Math.PI) deepBreathPhase = 0;
    }

    // === 微动作：细微的重心移动 ===
    const fidgetX = Math.sin(t * 0.23 + fidgetSeed) * 0.6;
    const fidgetR = Math.sin(t * 0.17 + fidgetSeed * 2) * 0.12;

    const bounce = breathExtra > 0 ? Math.sin(t * 12) * breathExtra : 0;

    if (!squishing) {
        pet.style.transform = `translateX(${fidgetX}px) translateY(${floatY + bounce}px) rotate(${floatR + fidgetR}deg) scale(${curScale * breathScale})`;
    }
    requestAnimationFrame(loop);
}
loop();

// 过渡速度预设
const EYE_SPEED = {
    snap:   '0s',                  // 瞬切（用于眨眼闭合瞬间）
    fast:   '0.08s',               // 快速（眨眼睁开）
    normal: '0.18s',               // 常规
    smooth: '0.3s',                // 平滑（情绪过渡）
    slow:   '0.45s',               // 慢（白日梦、发呆）
    drift:  '0.6s',                // 极慢（眼神缓慢飘移）
};

function _setEyeTransition(speed) {
    const dur = EYE_SPEED[speed] || speed || EYE_SPEED.normal;
    const ease = speed === 'snap' || speed === 'fast'
        ? 'linear'
        : speed === 'slow' || speed === 'drift'
            ? 'cubic-bezier(0.4, 0, 0.2, 1)'
            : 'cubic-bezier(0.25, 1, 0.5, 1)';
    const t = `width ${dur} ${ease}, height ${dur} ${ease}, border-radius ${dur} ${ease}, transform ${dur} ${ease}`;
    eyeL.style.transition = t;
    eyeR.style.transition = t;
}

function setEyes(L, R, speed) {
    if (speed) _setEyeTransition(speed);
    const d = { w:11, h:19, br:'6px', tx:0, ty:0, sx:1, sy:1, rot:0 };
    const l = { ...d, ...L };
    const r = R ? { ...d, ...R } : { ...l };
    eyeL.style.width = l.w+'px'; eyeL.style.height = l.h+'px'; eyeL.style.borderRadius = l.br;
    eyeL.style.transform = `translate(${l.tx}px,${l.ty}px) scale(${l.sx},${l.sy}) rotate(${l.rot}deg)`;
    eyeR.style.width = r.w+'px'; eyeR.style.height = r.h+'px'; eyeR.style.borderRadius = r.br;
    eyeR.style.transform = `translate(${r.tx}px,${r.ty}px) scale(${r.sx},${r.sy}) rotate(${r.rot}deg)`;
    // 用完后恢复默认速度
    if (speed) setTimeout(() => _setEyeTransition('normal'), 20);
}

// ===== 鼠标跟随 =====
let mouseTracking = true;
document.addEventListener('mousemove', (e) => {
    if (!mouseTracking) return;
    const rect = pet.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    const dx = Math.max(-2, Math.min(2, (e.clientX - cx) / window.innerWidth * 6));
    const dy = Math.max(-2, Math.min(2, (e.clientY - cy) / window.innerHeight * 6));
    eyeL.style.transform = `translate(${dx}px,${dy}px)`;
    eyeR.style.transform = `translate(${dx}px,${dy}px)`;
});

// ===== 眨眼（自然节奏）=====
function doBlink() {
    if (currentMood === 'sleepy' || currentMood === 'happy') { schedBlink(); return; }
    mouseTracking = false;
    EXPR.blink();
    const r = Math.random();
    if (r < 0.15) {
        // 15% 连眨两下
        setTimeout(() => {
            EXPR.normal(); setTimeout(() => {
                EXPR.blink(); setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 70);
            }, 100);
        }, 70);
    } else if (r < 0.3) {
        // 15% 半眨 → 全眨
        setTimeout(() => {
            EXPR.halfBlink();
            setTimeout(() => { EXPR.blink(); setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 80); }, 120);
        }, 70 + Math.random() * 40);
    } else if (r < 0.4) {
        // 10% 慢眨（像在走神）
        setTimeout(() => {
            EXPR.halfBlink();
            setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 250 + Math.random() * 150);
        }, 120);
    } else {
        // 50% 正常快速眨
        setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 70 + Math.random() * 30);
    }
    schedBlink();
}
function schedBlink() {
    // 不均匀间隔：偶尔快速连眨，偶尔长时间不眨
    const base = Math.random() < 0.2 ? 800 + Math.random() * 1500 : 2500 + Math.random() * 5000;
    setTimeout(doBlink, base);
}
schedBlink();

let isDrag = false, startX, startY, dragOffsetX, dragOffsetY, clickCount = 0, clickTimer = null;

pet.addEventListener('mousedown', e => { 
    isDrag = false; 
    startX = e.screenX; 
    startY = e.screenY; 
    // 记录鼠标在窗口内的相对位置，避免拖动时跳跃
    dragOffsetX = e.clientX;
    dragOffsetY = e.clientY;
});
document.addEventListener('mousemove', e => {
    if (startX !== undefined) {
        if (Math.abs(e.screenX - startX) > 3 || Math.abs(e.screenY - startY) > 3) isDrag = true;
    }
    if (isDrag && electronAPI) {
        // 用鼠标位置减去相对偏移，精确定位窗口
        electronAPI.send('drag-pet', {
            x: e.screenX, 
            y: e.screenY,
            offsetX: dragOffsetX,
            offsetY: dragOffsetY
        });
    }
});
document.addEventListener('mouseup', () => { setTimeout(() => { isDrag = false; startX = undefined; }, 30); });

pet.addEventListener('click', () => {
    if (isDrag) return;
    clickCount++;
    clearTimeout(clickTimer);
    squishing = true;
    
    // 🎨 增强点击动画：带颜色脉冲
    pet.style.animation = 'squish 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
    // 点击时球体稍微变亮
    pet.style.filter = 'brightness(1.15)';
    
    setTimeout(() => { 
        pet.style.animation = ''; 
        pet.style.filter = '';
        squishing = false; 
    }, 350);
    
    spawnParticles();
    mouseTracking = false;

    if (clickCount >= 3) {
        // 💖 三击超开心模式
        EXPR.superHappy();
        blushL.style.background = 'rgba(255,100,100,0.6)';
        blushR.style.background = 'rgba(255,100,100,0.6)';
        targetScale = 1.1;
        // 眼睛也要跟着放大
        eyeL.style.transform = 'scale(1.15)';
        eyeR.style.transform = 'scale(1.15)';
        
        // 三击打开历史消息
        if (electronAPI) electronAPI.invoke('show-history');
        setTimeout(() => { 
            resetClick(); 
            clickCount = 0;
            eyeL.style.transform = '';
            eyeR.style.transform = '';
        }, 1200);
    } else {
        // 随机表情 + 眼睛动画
        const rr = ['happy','wink','winkR','surprised','curious','giggle','sparkle','wow'];
        EXPR[rr[Math.floor(Math.random()*rr.length)]]();
        clickTimer = setTimeout(() => { resetClick(); clickCount = 0; }, 800);
    }
});

function resetClick() {
    applyMoodEyes();
    blushL.style.background = ''; blushR.style.background = '';
    targetScale = MOODS[currentMood]?.scale || 1;
    mouseTracking = true;
}

function spawnParticles() {
    const colors = ['#ff6b6b','#ffa07a','#ffb347','#ff69b4','#fff','#ffd700'];
    for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        const sz = 2 + Math.random() * 3;
        const a = (Math.PI * 2 / 8) * i + Math.random() * 0.4;
        const dist = 15 + Math.random() * 25;
        p.style.cssText = `position:absolute;border-radius:50%;pointer-events:none;
            width:${sz}px;height:${sz}px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            left:50%;top:50%;opacity:1;
            transition:transform 0.4s ease-out,opacity 0.4s ease-out;`;
        particlesEl.appendChild(p);
        requestAnimationFrame(() => {
            p.style.transform = `translate(${Math.cos(a)*dist}px,${Math.sin(a)*dist}px)`;
            p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 450);
    }
}

function deriveGrowthProfile(metrics = {}) {
    const uptimeHours = (metrics.uptimeMs || 0) / 3600000;
    const onlineEnergy = Math.round(uptimeHours * 6);
    const skillEnergy = (metrics.readySkills || 0) * 4;
    const workEnergy = (metrics.workCount || 0) * 3 + (metrics.requestsTotal || 0) * 4 + Math.floor((metrics.estimatedTokens || 0) / 1200);
    const totalEnergy = Math.max(0, onlineEnergy + skillEnergy + workEnergy);
    const level = Math.min(99, 1 + Math.floor(Math.sqrt(totalEnergy / 12)));
    const stars = Math.max(1, Math.min(5, 1 + Math.floor((level - 1) / 8)));
    return {
        connected: !!metrics.connected,
        energy: totalEnergy,
        level,
        stars
    };
}

function formatStatePill(mood) {
    return `${STATE_LABELS[mood]?.[uiLanguage] || wl('稳定', 'Stable')} · ${PET_NAME}`;
}

let activeSeriesTheme = SHELL_THEMES.idle;

function selectGrowthSeries(metrics = {}) {
    if (!metrics.connected) return SHELL_THEMES.offline;

    const uptimeHours = (metrics.uptimeMs || 0) / 3600000;
    const skillEnergy = (metrics.readySkills || 0) * 4;
    const workEnergy = (metrics.workCount || 0) * 3 + (metrics.requestsTotal || 0) * 4 + Math.floor((metrics.estimatedTokens || 0) / 1200);
    const onlineEnergy = Math.round(uptimeHours * 6);

    if (workEnergy >= skillEnergy && workEnergy >= onlineEnergy) {
        if ((metrics.requestsTotal || 0) >= 12) return SHELL_THEMES.excited;
        if ((metrics.workCount || 0) >= 8) return SHELL_THEMES.happy;
        return SHELL_THEMES.talking;
    }

    if (skillEnergy >= workEnergy && skillEnergy >= onlineEnergy) {
        if ((metrics.readySkills || 0) >= 20) return SHELL_THEMES.surprised;
        if ((metrics.contextPercentage || 0) >= 18) return SHELL_THEMES.focused;
        return SHELL_THEMES.thinking;
    }

    if (uptimeHours >= 12) return SHELL_THEMES.idle;
    if (uptimeHours >= 6) return SHELL_THEMES.calm;
    if ((metrics.activeSessions || 0) >= 2) return SHELL_THEMES.sad;
    return SHELL_THEMES.love;
}

function applySeriesTheme(theme) {
    activeSeriesTheme = theme || SHELL_THEMES.idle;
    if (shellBand) shellBand.style.background = activeSeriesTheme.band;
    if (shellGlyph) shellGlyph.style.background = activeSeriesTheme.glyph;

function applyMoodEyes() {
    const m = MOODS[currentMood];
    if (m && EXPR[m.eyes]) EXPR[m.eyes]();
}

function setMood(mood) {
    const map = { normal:'idle', busy:'talking', excited:'happy' };
    mood = map[mood] || mood;
    if (!MOODS[mood]) mood = 'idle';
    const m = MOODS[mood];

    // 任何情绪变化都算互动
    lastInteraction = Date.now();

    if (mood !== currentMood) {
        // 打断上一次未完成的过渡
        if (_moodTimer) { clearTimeout(_moodTimer); _moodTimer = null; }

        // filter 柔光过渡：亮起 → 换色 → 淡出，遮掩 gradient 跳变
        fluid.style.transition = 'filter 0.35s ease-in';
        fluid.style.filter = 'brightness(1.6) blur(2px)';

        _moodTimer = setTimeout(() => {
            // 峰值时瞬间换色（人眼在高亮度下感知不到跳变）
            fluid.style.background = m.fluid;
            blob1.style.background = m.b1;
            blob2.style.background = m.b2;
            // 🔮 应用情绪发光效果
            if (m.glow && glassShell) {
                glassShell.style.boxShadow = 'inset -2px -2px 8px rgba(255,255,255,0.08), inset 2px 2px 8px rgba(255,255,255,0.35), ' + m.glow;
            }
            blob1.style.animation = 'fluid-spin ' + m.speed + ' linear infinite';

            // 淡出回正常
            fluid.style.transition = 'filter 0.5s ease-out';
            fluid.style.filter = 'brightness(1) blur(0px)';

            _moodTimer = setTimeout(() => {
                fluid.style.transition = '';
                fluid.style.filter = '';
                _moodTimer = null;
            }, 550);
        }, 350);
    }

    currentMood = mood;
    if (statePill) {
        updateStatePill();
    }
    blob1.style.animationDuration = m.speed;

    if (mood === 'sleepy' || mood === 'sad') {
        blob1.style.transition = 'opacity 1.5s ease';
        blob1.style.opacity = '0.6';
    } else {
        blob1.style.transition = 'opacity 1.0s ease';
        blob1.style.opacity = '1';
    }

    targetScale = m.scale; breathExtra = m.bounce;
    mouseTracking = (mood !== 'sleepy' && mood !== 'happy' && mood !== 'sad');
    if (talkInterval) { clearInterval(talkInterval); talkInterval = null; }
    if (mood === 'talking') {
        let tog = false;
        talkInterval = setInterval(() => { tog=!tog; tog ? EXPR.talkBig() : EXPR.talking(); }, 250);
    } else { applyMoodEyes(); }

    if (mood === 'happy' || mood === 'excited' || mood === 'love') {
        blushL.style.transition = 'background 0.8s ease, opacity 0.6s ease';
        blushR.style.transition = 'background 0.8s ease, opacity 0.6s ease';
        blushL.style.background = mood === 'love' ? 'rgba(255,90,120,0.5)' : 'rgba(255,120,120,0.4)';
        blushR.style.background = mood === 'love' ? 'rgba(255,90,120,0.5)' : 'rgba(255,120,120,0.4)';
    } else {
        blushL.style.transition = 'background 0.6s ease, opacity 0.4s ease';
        blushR.style.transition = 'background 0.6s ease, opacity 0.4s ease';
        blushL.style.background = '';
        blushR.style.background = '';
    }
}

// 时间场景判定
function getTimeScene() {
    const h = new Date().getHours();
    if (h >= 6 && h < 11)  return 'morning';
    if (h >= 11 && h < 14) return 'noon';
    if (h >= 14 && h < 18) return 'afternoon';
    if (h >= 18 && h < 22) return 'evening';
    return 'latenight';
}

// 语气状态（从 AI 回复文本中提取）
let lastTone = 'neutral';
function detectTone(text) {
    if (!text) return 'neutral';
    if (/哈哈|嘻嘻|😄|😆|笑|开心|太好了|棒|厉害|不错|好耶/.test(text)) return 'cheerful';
    if (/害羞|脸红|嘿嘿|😳|😊|人家/.test(text)) return 'shy';
    if (/生气|可恶|气死|哼|😠|😤|讨厌/.test(text)) return 'annoyed';
    if (/难过|伤心|唉|😢|😭|呜呜|抱歉|对不起/.test(text)) return 'sad';
    if (/好奇|为什么|怎么|吗？|呢？|🤔|想想/.test(text)) return 'curious';
    if (/加油|冲|💪|努力|一定可以|相信/.test(text)) return 'encourage';
    if (/困|累|😴|哈欠|想睡|好困/.test(text)) return 'tired';
    if (/惊|天哪|什么|😱|😮|不会吧|哇/.test(text)) return 'surprised';
    if (/嗯|好的|了解|明白|知道了|收到/.test(text)) return 'calm';
    return 'neutral';
}

    // 偷瞄 → 被发现 → 假装没事
    () => { EXPR.peekL(); setTimeout(() => { EXPR.surprised(); setTimeout(() => { EXPR.nervous(); setTimeout(() => { EXPR.blink(); setTimeout(() => EXPR.normal(), 100); }, 300); }, 300); }, 800); },
    // 狡黠 → 调皮弹跳
    () => { EXPR.sly(); const s = targetScale; setTimeout(() => { EXPR.mischief(); targetScale = 1.08; setTimeout(() => { targetScale = 0.94; }, 200); setTimeout(() => { targetScale = s; EXPR.giggle(); }, 400); setTimeout(() => EXPR.normal(), 800); }, 500); },
    // 做鬼脸
    () => { EXPR.cross(); const s = targetScale; targetScale = 0.9; setTimeout(() => { EXPR.mischief(); targetScale = 1.05; }, 400); setTimeout(() => { targetScale = s; EXPR.giggle(); }, 700); setTimeout(() => EXPR.normal(), 1100); },
    ],

    dreamy: [
    // 白日梦 → 微笑
    () => { EXPR.daydream(); setTimeout(() => { EXPR.softSmile(); setTimeout(() => EXPR.normal(), 800); }, 1200); },
    // 发呆 → 深呼吸 → 惬意
    () => { EXPR.blank(); deepBreathPhase = 0.01; setTimeout(() => { EXPR.daydream(); setTimeout(() => { EXPR.content(); setTimeout(() => EXPR.normal(), 600); }, 1000); }, 800); },
    // 陶醉 → 满足
    () => { EXPR.bliss(); blushL.style.transition = 'background 0.4s'; blushR.style.transition = 'background 0.4s'; blushL.style.background = 'rgba(255,120,130,0.25)'; blushR.style.background = 'rgba(255,120,130,0.25)'; setTimeout(() => { EXPR.content(); blushL.style.transition = 'background 1s'; blushR.style.transition = 'background 1s'; blushL.style.background = ''; blushR.style.background = ''; }, 1500); setTimeout(() => EXPR.normal(), 2200); },
    // 仰望 → 白日梦 → 温柔微笑
    () => { EXPR.lookUp(); setTimeout(() => { EXPR.daydream(); setTimeout(() => { EXPR.softSmile(); setTimeout(() => EXPR.normal(), 700); }, 1200); }, 500); },
    ],
};

// 时间场景 → 偏好的动作池权重
const SCENE_WEIGHTS = {
    morning:   { sleepy: 4, daily: 3, dreamy: 2, shy: 1, thinking: 1 },
    noon:      { daily: 3, happy: 2, playful: 2, thinking: 1, sleepy: 1 },
    afternoon: { daily: 3, thinking: 2, happy: 1, dreamy: 1, playful: 1, encourage: 1 },
    evening:   { daily: 2, happy: 2, dreamy: 2, shy: 1, sleepy: 2 },
    latenight: { sleepy: 5, dreamy: 2, daily: 1, dizzy: 2, sad: 1 },
};

// 语气 → 偏好的动作池映射
const TONE_MAP = {
    cheerful: 'happy', shy: 'shy', annoyed: 'annoyed', sad: 'sad',
    curious: 'thinking', encourage: 'encourage', tired: 'sleepy',
    surprised: 'surprised', calm: 'dreamy', neutral: null,
};

// 智能选择动作
function pickIdleAction() {
    const scene = getTimeScene();
    const tonePool = TONE_MAP[lastTone];

    // 语气优先：最近有明确语气时 70% 概率按语气选
    if (tonePool && ACT[tonePool] && Math.random() < 0.7) {
        lastTone = 'neutral';
        const pool = ACT[tonePool];
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // 否则按时间场景加权随机
    const weights = SCENE_WEIGHTS[scene] || SCENE_WEIGHTS.afternoon;
    const entries = [];
    for (const [cat, w] of Object.entries(weights)) {
        if (ACT[cat]) for (let i = 0; i < w; i++) entries.push(cat);
    }
    const cat = entries[Math.floor(Math.random() * entries.length)];
    const pool = ACT[cat];
    return pool[Math.floor(Math.random() * pool.length)];
}

setInterval(() => {
    if (currentMood !== 'idle' || !mouseTracking) return;

    const idleTime = (Date.now() - lastInteraction) / 1000; // 秒

    // === 无聊渐进系统 ===
    if (idleTime > 180 && Math.random() < 0.25) {
        // 3 分钟没互动：打哈欠 / 伸懒腰
        mouseTracking = false;
        const r = Math.random();
        if (r < 0.4) {
            // 打哈欠：嘴巴张大 → 眯眼 → 发呆
            EXPR.wow();
            const s = targetScale;
            targetScale = 1.06;
            setTimeout(() => { EXPR.sleepy(); targetScale = s; }, 800);
            setTimeout(() => { EXPR.drowsy(); }, 1500);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 2500);
        } else if (r < 0.7) {
            // 伸懒腰 → 抖一抖 → 精神
            const s = targetScale;
            EXPR.sleepy();
            targetScale = 1.1;
            setTimeout(() => { targetScale = 0.92; }, 600);
            setTimeout(() => { targetScale = 1.06; EXPR.surprised(); }, 900);
            setTimeout(() => { targetScale = s; EXPR.normal(); mouseTracking = true; }, 1400);
        } else {
            // 发呆 → 慢慢回神
            EXPR.drowsy();
            setTimeout(() => EXPR.halfBlink(), 1200);
            setTimeout(() => { EXPR.blink(); }, 2000);
            setTimeout(() => { EXPR.curious(); }, 2200);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 2800);
        }
        return;
    }

    if (idleTime > 60 && Math.random() < 0.3) {
        // 1 分钟没互动：更多张望 / 无聊行为
        mouseTracking = false;
        const r = Math.random();
        if (r < 0.3) {
            // 叹气：深呼吸 + 半眨眼
            deepBreathPhase = 0.01;
            EXPR.halfBlink();
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 1500);
        } else if (r < 0.6) {
            // 左右张望，像在找事做
            EXPR.lookLeft();
            setTimeout(() => EXPR.lookUp(), 500);
            setTimeout(() => EXPR.lookRight(), 1000);
            setTimeout(() => { EXPR.hmm(); }, 1500);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 2200);
        } else {
            // 无聊歪头
            EXPR.hmm();
            const s = targetScale;
            targetScale = 0.97;
            setTimeout(() => { targetScale = s; EXPR.blink(); }, 1000);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 1300);
        }
        return;
    }

    // === 常规待机微表情（30% 触发率）===
    if (Math.random() < 0.3) {
        mouseTracking = false;
        pickIdleAction()();
        setTimeout(() => { mouseTracking = true; }, 1500);
    }
}, 4000);

// === 待机眼神游走（独立于微表情）===
setInterval(() => {
    if (currentMood !== 'idle' || !mouseTracking) return;
    if (Math.random() < 0.35) {
        // 眼睛缓慢飘向一个随机方向，像在"看"什么
        const dx = (Math.random() - 0.5) * 4;
        const dy = (Math.random() - 0.5) * 3;
        eyeL.style.transition = 'transform 0.8s ease';
        eyeR.style.transition = 'transform 0.8s ease';
        eyeL.style.transform = `translate(${dx}px,${dy}px)`;
        eyeR.style.transform = `translate(${dx}px,${dy}px)`;
        // 停留一会再飘回来
        setTimeout(() => {
            eyeL.style.transition = 'transform 1.2s ease';
            eyeR.style.transition = 'transform 1.2s ease';
            eyeL.style.transform = '';
            eyeR.style.transform = '';
            setTimeout(() => {
                eyeL.style.transition = '';
                eyeR.style.transition = '';
            }, 1200);
        }, 1500 + Math.random() * 2000);
    }
}, 5000);

// 记录互动时间
pet.addEventListener('mousedown', () => { lastInteraction = Date.now(); });
document.addEventListener('keydown', () => { lastInteraction = Date.now(); });

// ===== 工具栏 =====
function toggleInput() {
    inputBar.classList.toggle('show');
    if (inputBar.classList.contains('show')) inputEl.focus();
}

function toggleVoice() {
    voiceOn = !voiceOn;
    renderVoiceButton();
    if (electronAPI) electronAPI.invoke('set-voice-enabled', voiceOn);
    setMood('happy');
    setTimeout(() => setMood('idle'), 1500);
}

// ===== 模型切换 (CC Switch风格) =====
const modelBadge = document.getElementById('modelBadge');
const btnModelSwitch = document.getElementById('btnModelSwitch');
let currentModelColor = '#E8A838';

async function cycleModel() {
    if (!electronAPI) return;
    setMood('thinking');
    const raw = await electronAPI.invoke('model-next');
    const model = (raw && typeof raw === 'object' && ('success' in raw || 'model' in raw || 'error' in raw))
        ? (raw.success ? raw.model : null)
        : raw;
    if (model) {
        updateModelBadge(model);
        // 球体闪变动画
        flashModelSwitch(model.color);
        setMood('happy');
        setTimeout(() => setMood('idle'), 2000);
    } else {
        setMood('idle');
    }
}

function updateModelBadge(model) {
    if (!modelBadge || !model) return;
    const badgeText = (model.icon || '').toString().trim() || 'AI';
    modelBadge.textContent = badgeText;
    modelBadge.style.color = model.color;
    currentModelColor = model.color;
    if (btnModelSwitch) {
        const currentName = model.shortName || model.name || model.id || wl('未知模型', 'Unknown model');
        btnModelSwitch.title = wl(`切换模型（当前：${currentName}）`, `Switch model (current: ${currentName})`);
    }
}

function flashModelSwitch(color) {
    // 球体快速闪变效果
    const pet = document.getElementById('pet');
    pet.style.transition = 'filter 0.15s';
    pet.style.filter = `brightness(1.5) drop-shadow(0 0 15px ${color})`;
    setTimeout(() => {
        pet.style.filter = '';
        pet.style.transition = '';
    }, 400);
}

// 初始化时获取当前模型
if (electronAPI) {
    electronAPI.invoke('app-get-language').then((lang) => {
        uiLanguage = normalizeLang(lang || uiLanguage);
        updateUiTextByLanguage();
        updateStatePill();
    }).catch(() => {
        updateUiTextByLanguage();
        updateStatePill();
    });
    electronAPI.on('app-language-changed', (lang) => {
        uiLanguage = normalizeLang(lang || uiLanguage);
        updateUiTextByLanguage();
        updateStatePill();
    });

    electronAPI.invoke('get-voice-enabled').then((enabled) => {
        voiceOn = enabled !== false;
        renderVoiceButton();
    }).catch(() => {
        renderVoiceButton();
    });

    electronAPI.invoke('model-current').then(model => {
        if (model) updateModelBadge(model);
    });

    // 监听模型变更事件（来自托盘菜单切换）
    electronAPI.on('model-changed', (model) => {
        updateModelBadge(model);
        flashModelSwitch(model.color);
    });
}

async function screenshot() {
    if (!electronAPI) return;
    setMood('thinking');
    const result = await electronAPI.invoke('take-screenshot', 'manual');
    if (result.success) {
        setMood('happy');
        setTimeout(() => setMood('idle'), 2000);
    } else { setMood('idle'); }
}

async function send() {
    const msg = inputEl.value.trim();
    if (!msg || !electronAPI) return;
    electronAPI.send('chat-timing', { phase: 'send_clicked', text: String(msg).slice(0, 80) });
    inputEl.value = '';
    inputBar.classList.remove('show');
    isAwaitingReply = true;
    updateStatePill();
    setMood('thinking');
    const reply = await electronAPI.invoke('openclaw-send', msg);
    electronAPI.send('chat-timing', { phase: 'send_invoke_resolved', reply: String(reply || '').slice(0, 120) });
    if (!reply || reply.startsWith('请求失败') || reply.startsWith('连接失败') || reply.startsWith('错误')) {
        isAwaitingReply = false;
        updateStatePill();
    }
    if (reply && !reply.startsWith('请求失败') && !reply.startsWith('连接失败') && !reply.startsWith('错误')) {
        setMood('happy');
        setTimeout(() => setMood('idle'), 3000);
    }
}

// ===== IPC =====
if (electronAPI) {
    electronAPI.on('new-message', (msg) => {
        setMood('talking');
        setTimeout(() => setMood('idle'), 3000);
    });
    electronAPI.on('agent-response', (res) => {
        isAwaitingReply = false;
        updateStatePill();
        if (res.responseId) {
            notifyReplyBubbleRendered(res.responseId);
        }
        lastTone = detectTone(res.content);
        // 把外部 emotion 映射成养蛋状态，内部仍复用原有驱动机制
        const emotionMoodMap = {
            happy: 'happy',
            surprised: 'surprised',
            sad: 'sad',
            fearful: 'fearful',
            angry: 'angry',
            thinking: 'thinking',
            calm: 'calm',
            disgusted: 'angry',
            excited: 'excited',
            love: 'love',
            focused: 'focused'
        };
        const mood = emotionMoodMap[res.emotion] || 'calm';
        setMood(mood);
        // 根据情绪调整恢复时间
        const recoveryTime = (mood === 'thinking') ? 8000 : (mood === 'sad') ? 7000 : (mood === 'fearful') ? 6000 : 5000;
        setTimeout(() => setMood('idle'), recoveryTime);
    });
    electronAPI.on('status-update', (s) => {
        const wasConnected = isConnected;
        isConnected = s.connected;
        if (!wasConnected && isConnected) {
            // 复活动画！从灰色→彩色
            setMood('happy');
            squishing = true;
            pet.style.animation = 'squish 0.5s ease';
            setTimeout(() => { pet.style.animation = ''; squishing = false; }, 500);
            spawnParticles();
            spawnParticles(); // 双倍粒子庆祝
            setTimeout(() => setMood('idle'), 3000);
        } else if (wasConnected && !isConnected) {
            setMood('offline');
        }
    });
}

// 状态检查
if (electronAPI) {
    setInterval(async () => {
        const s = await electronAPI.invoke('openclaw-status');
        const wasConnected = isConnected;
        isConnected = s.connected;
        if (!wasConnected && isConnected && currentMood === 'offline') {
            // 复活！
            setMood('happy');
            squishing = true;
            pet.style.animation = 'squish 0.5s ease';
            setTimeout(() => { pet.style.animation = ''; squishing = false; }, 500);
            spawnParticles();
            spawnParticles();
            setTimeout(() => setMood('idle'), 3000);
        } else if (!isConnected && currentMood !== 'offline') {
            setMood('offline');
        }
    }, 10000);
}

// 初始化 — 先显示离线，等连接成功后复活
updateUiTextByLanguage();
setMood('offline');
refreshGrowthSeries();
setInterval(refreshGrowthSeries, 30000);
if (electronAPI) {
    setTimeout(async () => {
        const s = await electronAPI.invoke('openclaw-status');
        isConnected = s.connected;
        if (isConnected) {
            setMood('happy');
            squishing = true;
            pet.style.animation = 'squish 0.5s ease';
            setTimeout(() => { pet.style.animation = ''; squishing = false; }, 500);
            spawnParticles();
            setTimeout(() => setMood('idle'), 2000);
        }
    }, 1500);
}
</script>
